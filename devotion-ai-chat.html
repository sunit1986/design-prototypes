<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>Devotion AI — Jio Omni AI</title>
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --surface:#ffffff; --surface-ghost:#eeeeef; --surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad; --surface-minimal:#f5f5f6; --surface-moderate:#e3e3e4;
  --text-high:#0c0d10; --text-medium:#191b1e; --text-low:rgba(25,27,30,0.65);
  --text-on-bold:#ffffff; --icon-medium:#170054; --icon-high:#0c0d10;
  --primary-20:#e8e8fc; --primary-30:#9999ff; --primary-50:#3535f3;
  --primary-60:#000093; --primary-70:#00004c;
  --sparkle-20:#e8faf7; --sparkle-30:#a7f6e9; --sparkle-50:#1eccb0;
  --sparkle-60:#1e7b74; --sparkle-70:#0e5c4f;
  --secondary-20:#fef7e9; --secondary-30:#ffe3ae; --secondary-50:#f7ab20; --secondary-60:#ac660c;
  --success:#25ab21; --success-20:#e6f7e6;
  --error:#fa2f40; --error-20:#fde8ea; --warning:#f06d0f;
  --grey-100:#141414; --grey-80:rgba(0,0,0,0.66); --grey-60:#b5b5b5; --grey-40:#e0e0e0; --grey-20:#f5f5f5;
  --shape-4xl:23px; --shape-pill:999px; --shape-large:16px; --shape-medium:12px; --shape-small:8px; --shape-xsmall:4px;
  --spacing-2xs:6px; --spacing-xs:8px; --spacing-s:12px; --spacing-m:16px; --spacing-l:20px; --spacing-xl:24px;
  --stroke-minimal:rgba(36,38,43,0.13); --stroke-subtle:rgba(36,38,43,0.12);
  --spring:350ms linear(0,0.3667,0.8271,1.0379,1.0652,1.0332,1.006,0.9961,0.996,0.9984,0.9999,1);
  --ease-standard:cubic-bezier(0.4,0.0,0.2,1); --ease-decelerate:cubic-bezier(0.0,0.0,0.2,1);
  --dur-quick:150ms; --dur-mod:250ms; --dur-del:350ms;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;touch-action:manipulation;}
body{font-family:'JioType',-apple-system,BlinkMacSystemFont,sans-serif;background:#e8e8e8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 0;}
@media(max-width:768px){body{background:#fff!important;padding:0!important;align-items:stretch!important;}.phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important;}}

.phone-frame{width:360px;height:800px;background:var(--surface);position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:32px;box-shadow:0 24px 80px rgba(0,0,0,0.15);}

/* STATUS BAR */
.status-bar{height:52px;padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--surface);}
.status-bar .time{font-size:15px;font-weight:600;color:var(--text-high);}
.status-bar .icons{display:flex;gap:6px;align-items:center;}
.status-bar .icons svg{width:16px;height:16px;fill:var(--text-high);}

/* HEADER */
.header-nav{height:56px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--surface-moderate);background:var(--surface);}
.header-left{display:flex;align-items:center;gap:8px;}
.back-btn{width:40px;height:40px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background var(--dur-quick) var(--ease-standard);}
.back-btn:active{background:var(--grey-20);}
.back-btn svg{width:24px;height:24px;fill:var(--icon-medium);}
.header-title-area{flex:1;}
.header-title{font-size:16px;font-weight:500;color:var(--text-high);line-height:1;}
.header-domain{font-size:12px;color:var(--text-low);line-height:1.3;}
.header-right{display:flex;gap:4px;}
.icon-btn-ghost{width:36px;height:36px;border-radius:var(--shape-pill);display:flex;align-items:center;justify-content:center;background:var(--surface-ghost);border:none;cursor:pointer;transition:background var(--dur-quick) var(--ease-standard);}
.icon-btn-ghost:active{background:var(--surface-moderate);}
.icon-btn-ghost svg{width:20px;height:20px;fill:var(--icon-medium);}

/* CHAT CONTAINER */
.chat-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;scrollbar-width:none;}
.chat-container::-webkit-scrollbar{display:none;}

/* AI MESSAGE */
.ai-msg{display:flex;gap:8px;align-items:flex-start;animation:msgIn var(--dur-del) var(--ease-decelerate);}
.ai-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;margin-top:2px;background:var(--primary-20);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ai-avatar video{width:100%;height:100%;object-fit:cover;}
.ai-avatar-dots{display:grid;grid-template-columns:1fr 1fr;gap:3px;width:14px;height:14px;}
.ai-avatar-dots div{border-radius:50%;background:var(--primary-50);}
.ai-content{flex:1;max-width:calc(100% - 40px);min-width:0;}
.ai-text{font-size:14px;line-height:1.5;color:var(--text-high);letter-spacing:-0.005em;}
.ai-text p{margin-bottom:8px;}
.ai-text p:last-child{margin-bottom:0;}
.ai-text strong{font-weight:700;}

/* USER MESSAGE */
.user-msg{display:flex;justify-content:flex-end;animation:msgIn var(--dur-del) var(--ease-decelerate);}
.user-bubble{max-width:270px;background:var(--surface-ghost);color:var(--text-high);padding:12px 16px;border-radius:24px 24px 0 24px;font-size:14px;line-height:1.4;letter-spacing:-0.005em;font-weight:500;}

/* THINKING */
.thinking-row{display:flex;align-items:center;gap:8px;animation:msgIn var(--dur-mod) var(--ease-decelerate);}
.thinking-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--primary-20);display:flex;align-items:center;justify-content:center;}
.thinking-dots{display:flex;gap:4px;}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--primary-50);animation:dotBounce 1.2s infinite;}
.thinking-dots span:nth-child(2){animation-delay:.15s;}
.thinking-dots span:nth-child(3){animation-delay:.3s;}

/* FEEDBACK */
.feedback-row{display:flex;gap:2px;margin-top:8px;}
.fb-btn{width:29px;height:29px;border-radius:var(--shape-pill);background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--dur-quick) var(--ease-standard);}
.fb-btn:active{background:var(--grey-20);}
.fb-btn svg{width:16px;height:16px;fill:var(--icon-high);}

/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.chip-row.scroll{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.chip-row.scroll::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1.5px solid var(--stroke-minimal);border-radius:var(--shape-pill);background:var(--surface);font-family:'JioType',sans-serif;font-size:13px;font-weight:500;color:var(--text-high);cursor:pointer;transition:all var(--dur-quick) var(--ease-standard);letter-spacing:-0.005em;white-space:nowrap;flex-shrink:0;}
.chip:active{transform:scale(0.97);}
.chip:hover{border-color:var(--primary-30);background:var(--primary-20);}
.chip svg{width:16px;height:16px;fill:var(--icon-medium);}
.chip.cta{background:var(--surface-bold);border-color:var(--surface-bold);color:#fff;font-weight:700;}
.chip.cta:hover{background:var(--primary-60);}
.chip.cta svg{fill:#fff;}

/* FAITH CHIPS */
.faith-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.faith-chip{display:flex;align-items:center;gap:10px;padding:14px 14px;border:2px solid var(--grey-40);border-radius:var(--shape-large);background:var(--surface);font-family:'JioType',sans-serif;font-size:14px;font-weight:600;color:var(--text-high);cursor:pointer;transition:all var(--dur-quick) var(--ease-standard);}
.faith-chip:active{transform:scale(0.97);}
.faith-chip.selected{border-color:var(--primary-50);background:var(--primary-20);color:var(--primary-60);}
.faith-icon{width:36px;height:36px;border-radius:var(--shape-small);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.faith-icon svg{width:20px;height:20px;fill:#fff;}

/* SETUP SUCCESS WIDGET */
.setup-widget{background:var(--success-20);border-radius:var(--shape-large);border:1.5px solid #6bcf67;padding:16px;animation:successPop 400ms var(--spring);width:100%;}
.setup-widget-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.setup-check{width:40px;height:40px;border-radius:50%;background:var(--success);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.setup-check svg{width:22px;height:22px;fill:#fff;}
.setup-title{font-size:16px;font-weight:700;color:var(--text-high);line-height:1.2;}
.setup-subtitle{font-size:12px;color:var(--success);margin-top:2px;font-weight:600;}
.setup-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.setup-detail{background:rgba(255,255,255,0.75);border-radius:var(--shape-small);padding:10px 12px;}
.setup-detail-label{font-size:10px;color:var(--text-low);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.setup-detail-value{font-size:14px;font-weight:700;color:var(--text-high);margin-top:3px;}
.setup-cta{width:100%;padding:13px;background:var(--success);border:none;border-radius:var(--shape-medium);font-family:'JioType',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:opacity var(--dur-quick) var(--ease-standard);display:flex;align-items:center;justify-content:center;gap:8px;}
.setup-cta:active{opacity:0.85;}
.setup-cta svg{width:18px;height:18px;fill:#fff;}

/* RITUAL CARD */
.ritual-card{background:var(--primary-70);border-radius:var(--shape-large);padding:18px 20px;width:100%;animation:cardIn var(--spring);overflow:hidden;position:relative;}
.ritual-card::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.06);}
.ritual-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;}
.ritual-title{font-size:22px;font-weight:900;color:#fff;margin-top:4px;letter-spacing:-0.02em;line-height:1.1;}
.ritual-meta{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px;}
.ritual-tracks{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.ritual-track{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,0.1);border-radius:var(--shape-small);}
.ritual-track-num{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);width:16px;}
.ritual-track-info{flex:1;}
.ritual-track-name{font-size:13px;font-weight:600;color:#fff;}
.ritual-track-artist{font-size:11px;color:rgba(255,255,255,0.45);}
.ritual-track-dur{font-size:11px;color:rgba(255,255,255,0.4);}
.ritual-begin-btn{width:100%;margin-top:14px;padding:13px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:var(--shape-medium);font-family:'JioType',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--dur-quick) var(--ease-standard);}
.ritual-begin-btn:active{background:rgba(255,255,255,0.25);}
.ritual-begin-btn svg{width:18px;height:18px;fill:#fff;}

/* FESTIVAL CARDS */
.festival-row{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0 4px;width:100%;}
.festival-row::-webkit-scrollbar{display:none;}
.festival-card{flex-shrink:0;width:158px;border-radius:var(--shape-large);overflow:hidden;cursor:pointer;border:1px solid var(--stroke-subtle);transition:transform var(--dur-quick) var(--ease-standard);}
.festival-card:active{transform:scale(0.97);}
.festival-card-img{height:100px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.festival-card-img svg{width:38px;height:38px;fill:rgba(255,255,255,0.7);z-index:1;position:relative;}
.festival-countdown{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.45);border-radius:var(--shape-xsmall);padding:3px 8px;font-size:10px;font-weight:700;color:#fff;letter-spacing:0.03em;}
.festival-card-body{padding:10px 12px 13px;background:var(--surface);}
.festival-name{font-size:13px;font-weight:700;color:var(--text-high);}
.festival-date{font-size:11px;color:var(--text-low);margin-top:2px;}

/* PUJA VIDHI WIDGET */
.puja-widget{border:1px solid var(--stroke-subtle);border-radius:var(--shape-large);overflow:hidden;animation:cardIn var(--spring);width:100%;}
.puja-header{padding:14px 16px;background:var(--primary-20);display:flex;align-items:center;gap:10px;}
.puja-header svg{width:20px;height:20px;fill:var(--primary-50);flex-shrink:0;}
.puja-header-title{font-size:15px;font-weight:700;color:var(--primary-60);}
.puja-steps{padding:14px 16px 16px;display:flex;flex-direction:column;gap:14px;}
.puja-step{display:flex;gap:12px;align-items:flex-start;}
.puja-step-num{width:24px;height:24px;border-radius:50%;background:var(--primary-50);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#fff;margin-top:1px;}
.puja-step-name{font-size:14px;font-weight:700;color:var(--text-high);}
.puja-step-desc{font-size:12px;color:var(--text-low);margin-top:3px;line-height:1.45;}
.puja-step-mantra{margin-top:6px;padding:8px 10px;background:var(--primary-20);border-radius:var(--shape-small);font-size:13px;color:var(--primary-60);font-weight:500;line-height:1.5;}

/* MANTRA CARD */
.mantra-card{background:var(--secondary-20);border:1px solid var(--secondary-30);border-radius:var(--shape-large);padding:16px;animation:cardIn var(--spring);width:100%;}
.mantra-label{font-size:10px;font-weight:800;color:var(--secondary-60);letter-spacing:0.07em;text-transform:uppercase;}
.mantra-text{font-size:19px;font-weight:700;color:var(--text-high);margin-top:8px;line-height:1.4;letter-spacing:-0.01em;}
.mantra-romanized{font-size:12px;color:var(--text-low);margin-top:4px;font-style:italic;}
.mantra-meaning{font-size:13px;color:var(--text-medium);margin-top:8px;line-height:1.55;}
.mantra-count{margin-top:10px;display:flex;align-items:center;gap:6px;}
.mantra-count svg{width:14px;height:14px;fill:var(--secondary-60);}
.mantra-count span{font-size:12px;font-weight:600;color:var(--secondary-60);}

/* PANCHANG STRIP */
.panchang-strip{background:var(--surface-ghost);border-radius:var(--shape-medium);padding:12px 14px;display:flex;gap:20px;overflow-x:auto;scrollbar-width:none;width:100%;animation:cardIn var(--spring);}
.panchang-strip::-webkit-scrollbar{display:none;}
.panchang-item{flex-shrink:0;}
.panchang-key{font-size:10px;font-weight:700;color:var(--text-low);text-transform:uppercase;letter-spacing:0.04em;}
.panchang-val{font-size:13px;font-weight:700;color:var(--text-high);margin-top:2px;}

/* NAMAAZ CARD */
.namaaz-card{border:1px solid var(--stroke-subtle);border-radius:var(--shape-large);overflow:hidden;animation:cardIn var(--spring);width:100%;}
.namaaz-header{padding:12px 16px;background:#2d8a4e;display:flex;align-items:center;gap:8px;}
.namaaz-header svg{width:18px;height:18px;fill:rgba(255,255,255,0.8);}
.namaaz-header-title{font-size:14px;font-weight:700;color:#fff;}
.namaaz-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--grey-40);}
.namaaz-row:last-child{border-bottom:none;}
.namaaz-row.current{background:#e8f5ec;}
.namaaz-name{font-size:14px;font-weight:600;color:var(--text-high);display:flex;align-items:center;gap:6px;}
.namaaz-time{font-size:14px;font-weight:700;color:var(--primary-60);}
.namaaz-row.current .namaaz-name{color:#2d8a4e;}
.namaaz-live-badge{font-size:9px;font-weight:800;color:#fff;background:#2d8a4e;padding:2px 6px;border-radius:3px;letter-spacing:0.04em;}

/* HUKAMNAMA CARD */
.hukam-card{background:linear-gradient(135deg,#1a5fb4,#2d8a9e);border-radius:var(--shape-large);padding:16px;animation:cardIn var(--spring);width:100%;}
.hukam-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.07em;}
.hukam-text{font-size:15px;font-weight:600;color:#fff;margin-top:8px;line-height:1.6;}
.hukam-translation{font-size:12px;color:rgba(255,255,255,0.65);margin-top:8px;line-height:1.5;font-style:italic;}
.hukam-source{font-size:11px;color:rgba(255,255,255,0.5);margin-top:8px;}

/* INFO CARD */
.info-card{background:var(--surface-ghost);border-radius:var(--shape-large);padding:14px 16px;animation:cardIn var(--spring);width:100%;}
.info-card-title{font-size:14px;font-weight:700;color:var(--text-high);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.info-card-title svg{width:16px;height:16px;fill:var(--primary-50);}
.info-card-text{font-size:13px;color:var(--text-medium);line-height:1.6;}
.info-card-highlight{margin-top:8px;padding:10px 12px;background:var(--primary-20);border-radius:var(--shape-small);font-size:13px;color:var(--primary-60);font-weight:500;}

/* LIVE DARSHAN CARD */
.darshan-card{border:1px solid var(--stroke-subtle);border-radius:var(--shape-large);overflow:hidden;animation:cardIn var(--spring);width:100%;cursor:pointer;transition:transform var(--dur-quick) var(--ease-standard);}
.darshan-card:active{transform:scale(0.98);}
.darshan-img{height:130px;display:flex;align-items:center;justify-content:center;position:relative;}
.darshan-img svg{width:48px;height:48px;fill:rgba(255,255,255,0.6);z-index:1;position:relative;}
.darshan-live-badge{position:absolute;top:10px;left:10px;background:var(--error);border-radius:var(--shape-xsmall);padding:3px 8px;display:flex;align-items:center;gap:4px;}
.darshan-live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:livePulse 1.2s infinite;}
.darshan-live-text{font-size:10px;font-weight:800;color:#fff;letter-spacing:0.04em;}
.darshan-viewers{position:absolute;bottom:10px;right:10px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:3px;}
.darshan-body{padding:12px 14px;}
.darshan-name{font-size:15px;font-weight:700;color:var(--text-high);}
.darshan-timing{font-size:12px;color:var(--text-low);margin-top:2px;}

/* NAVKAR MANTRA CARD (Jain) */
.navkar-card{background:linear-gradient(135deg,#4a0d75,#7c3fa3);border-radius:var(--shape-large);padding:16px;animation:cardIn var(--spring);width:100%;}
.navkar-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.07em;}
.navkar-lines{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.navkar-line{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.5;}
.navkar-meaning{font-size:12px;color:rgba(255,255,255,0.5);margin-top:8px;line-height:1.5;font-style:italic;}

/* BOTTOM INPUT */
.bottom-widget{width:100%;padding:2px 12px 8px;background:var(--surface);flex-shrink:0;}
.bw-container{background:var(--surface-ghost);border-radius:var(--shape-4xl);padding:var(--spacing-2xs);display:flex;flex-direction:column;}
.bw-input{padding:12px 8px;}
.bw-real-input{flex:1;border:none;outline:none;font-family:'JioType',sans-serif;font-size:14px;color:var(--text-high);background:transparent;width:100%;}
.bw-real-input::placeholder{color:var(--text-low);}
.bw-actions{display:flex;justify-content:space-between;align-items:center;height:43px;}
.bw-left{display:flex;gap:2px;}
.wib{width:36px;height:36px;border-radius:var(--shape-pill);display:flex;align-items:center;justify-content:center;background:var(--surface-ghost-icon);border:none;cursor:pointer;transition:background var(--dur-quick) var(--ease-standard);}
.wib:active{background:var(--surface-moderate);}
.wib svg{width:20px;height:20px;fill:var(--icon-medium);}
.speak-btn{background:var(--surface-bold);border:none;border-radius:var(--shape-pill);padding:12px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:opacity var(--dur-quick) var(--ease-standard);}
.speak-btn:active{opacity:0.85;}
.speak-btn svg{width:18px;height:18px;fill:var(--text-on-bold);}
.speak-btn span{font-family:'JioType',sans-serif;font-weight:700;font-size:16px;color:var(--text-on-bold);}
.bw-send{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface-bold);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity var(--dur-quick) var(--ease-standard);}
.bw-send:active{opacity:0.85;}
.bw-send svg{width:18px;height:18px;fill:var(--text-on-bold);}
.bw-send.hidden-send{display:none;}

/* VOICE OVERLAY ANIMATIONS */
@keyframes vDotBreath{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(.92);opacity:.4}}
@keyframes vDotListen{0%,100%{transform:scale(1);opacity:1}25%{transform:scale(.7);opacity:.5}50%{transform:scale(1.08);opacity:1}75%{transform:scale(.8);opacity:.6}}
@keyframes vDotProcess{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1);opacity:1}}
@keyframes vMicPulse{0%,100%{box-shadow:0 0 0 0 rgba(109,23,206,.4)}50%{box-shadow:0 0 0 16px rgba(109,23,206,0)}}
.v-dots{width:148px;height:148px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.v-dots div{border-radius:50%;background:#6d17ce;transition:background .3s;}
.v-dots--idle div{animation:vDotBreath 2.5s ease-in-out infinite;opacity:.5;}
.v-dots--idle div:nth-child(2){animation-delay:.3s;}.v-dots--idle div:nth-child(3){animation-delay:.6s;}.v-dots--idle div:nth-child(4){animation-delay:.9s;}
.v-dots--listening div{animation:vDotListen 1s ease-in-out infinite;background:#6d17ce;}
.v-dots--listening div:nth-child(2){animation-delay:.15s;}.v-dots--listening div:nth-child(3){animation-delay:.3s;}.v-dots--listening div:nth-child(4){animation-delay:.45s;}
.v-dots--processing div,.v-dots--thinking div{animation:vDotProcess 1.2s ease-in-out infinite;background:#9966dd;}
.v-dots--processing div:nth-child(2),.v-dots--thinking div:nth-child(2){animation-delay:.2s;}
.v-dots--processing div:nth-child(3),.v-dots--thinking div:nth-child(3){animation-delay:.4s;}
.v-dots--processing div:nth-child(4),.v-dots--thinking div:nth-child(4){animation-delay:.6s;}
.v-dots--speaking div{animation:vDotListen 1.6s ease-in-out infinite;background:#3535f3;}
.v-dots--speaking div:nth-child(2){animation-delay:.2s;}.v-dots--speaking div:nth-child(3){animation-delay:.4s;}.v-dots--speaking div:nth-child(4){animation-delay:.6s;}
.v-mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:#6d17ce;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.v-mic-btn:active{transform:scale(.92);}
.v-mic-btn.v-mic--pulse{animation:vMicPulse 1.5s ease-in-out infinite;}
.v-stop-btn{width:64px;height:64px;border-radius:50%;border:none;background:#fa2f40;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.v-stop-btn:active{transform:scale(.92);}

/* KEYFRAMES */
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes successPop{0%{transform:scale(0.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
</style>
</head>

function chipTap(value, label) {
  if (label) userMessage(label);
  handleOnboardingChip(value);
}

function handleOnboardingChip(value) {
  if (!isOnboarding) { triggerChip(value); return; }

  if (value === 'get_started') {
    onboardingStep = 1;
    setTimeout(askFaith, 400);
  } else if (onboardingStep === 1) {
    userFaith = value;
    document.getElementById('headerDomain').textContent = faithData[value]?.domain || 'Spiritual';
    setTimeout(() => askLanguage(value), 400);
  } else if (onboardingStep === 2) {
    userLanguage = value;
    setTimeout(() => askDuration(), 400);
  } else if (onboardingStep === 3) {
    userDuration = value;
    setTimeout(() => askDeity(), 400);
  } else if (onboardingStep === 4) {
    userDeity = value;
    setTimeout(() => completeSetup(), 400);
  }
}

// ── Trigger post-onboarding chips ──
function triggerChip(key) {
  const lk = key.toLowerCase();
  userMessage(key.charAt(0).toUpperCase() + key.slice(1));
  const thinking = showThinking();
  setTimeout(() => {
    removeThinking();
    handleResponse(lk);
  }, 1200);
}

function sendUserText() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  toggleSendBtn();
  userMessage(text);
  const thinking = showThinking();
  setTimeout(() => {
    removeThinking();
    handleResponse(text.toLowerCase());
  }, 1400);
}

function handleResponse(q) {
  const faith = userFaith || 'Hindu';

  // Onboarding shortcut
  if (!isOnboarding && (q.includes('get started') || q.includes('reset') || q.includes('change faith'))) {
    isOnboarding = true; onboardingStep = 0; userFaith = null;
    setTimeout(() => askFaith(), 300);
    return;
  }
  if (q.includes('begin') || q.includes('begin today') || q.includes('ritual')) { beginTodayRitual(); return; }
  if (q.includes('panchang') || q.includes('tithi') || q.includes('panchang')) { showPanchang(); return; }
  if (q.includes('puja vidhi') || q.includes('puja') || q.includes('pooja')) { showPujaVidhi(faith); return; }
  if (q.includes('mantra') || q.includes('mantr')) { showMantraOfDay(faith); return; }
  if (q.includes('festival') || q.includes('holi') || q.includes('navratri') || q.includes('ramzan') || q.includes('eid') || q.includes('easter') || q.includes('baisakhi')) { showFestivalDetail(q, faith); return; }
  if (q.includes('live darshan') || q.includes('darshan')) { showLiveDarshan(faith); return; }
  if (q.includes('namaaz') || q.includes('namaz') || q.includes('prayer times')) { showNamaazTimes(); return; }
  if (q.includes('quran') || q.includes('verse')) { showQuranVerse(); return; }
  if (q.includes('dua') || q.includes('dua ')) { showDua(); return; }
  if (q.includes('hukamnama') || q.includes('hukam')) { showHukamnama(); return; }
  if (q.includes('nitnem')) { showNitnem(); return; }
  if (q.includes('ardaas')) { showArdaas(); return; }
  if (q.includes('navkar') || q.includes('samayik')) { showNavkarMantra(); return; }
  if (q.includes('bible') || q.includes('verse')) { showBibleVerse(); return; }
  if (q.includes('prayer')) { showMorningPrayer(faith); return; }
  if (q.includes('settings') || q.includes('setting')) { showSettingsInfo(); return; }
  if (q.includes('ekadashi')) { showEkadashiInfo(); return; }
  if (q.includes('rahu') || q.includes('muhurat')) { showRahuKaal(); return; }

  // Generic AI response
  showGenericResponse(q, faith);
}

  userMessage('Change my profile');
  isOnboarding = true; onboardingStep = 0; userFaith = null; userLanguage = null; userDuration = null; userDeity = null;
  document.getElementById('headerDomain').textContent = 'Spiritual';
  setTimeout(() => askFaith(), 500);
}

function showGenericResponse(q, faith) {
  const responses = [
    `<p>That's a thoughtful question about ${faith} practices. Let me share what I know.</p><p>Devotional practices are deeply personal and vary across traditions. The key is consistency — even 5 minutes of sincere practice each day is more powerful than an hour done once a week.</p><p>Would you like me to help with something specific — puja guidance, mantra for this situation, or festival prep?</p>`,
    `<p>In ${faith} tradition, this is approached with great depth and care. The ancient wisdom suggests starting with inner purification (of thought and intention) before any outer ritual.</p><p>Whatever you're navigating, I'm here to guide you through it — spiritually and practically.</p>`,
    `<p>Great question! Here's a simple way to approach this from a ${faith} perspective: begin each day by connecting with your chosen deity or practice before the mind becomes busy.</p><p>The morning hours (Brahma Muhurta for Hindus, Amrit Vela for Sikhs, Fajr for Muslims) are considered most potent for spiritual practice.</p>`,
  ];
  const r = responses[Math.floor(Math.random() * responses.length)];

  getPostSetupChips(faith).slice(0,4).forEach(c => {

  });
  msg.querySelector('.ai-content').appendChild(chipRow);
}

// ── Voice Overlay ──
const _vp = ['sk','_8ajz','668k_','7FQZo','3QWwc','AQ8Sm','30SmT','t6L4'];
const SARVAM_KEY = _vp[0]+_vp[1]+_vp[2]+_vp[3]+_vp[4]+_vp[5]+_vp[6]+_vp[7];
const VOICE_CHAT_PROXY = 'https://jbiq-proxy.sunit3-sharma.workers.dev';

document.getElementById('speakBtn').addEventListener('click', e => { e.stopPropagation(); openVoice(); });

function openVoice() { vUnlockAudio(); document.getElementById('voiceOverlay').style.display='flex'; setVoiceState('idle'); }
function closeVoice() { vKillRecording(); if(vCurrentAudio){vCurrentAudio.pause();vCurrentAudio=null;} document.getElementById('voiceOverlay').style.display='none'; vState='closed'; }
function voiceTapMic() { vUnlockAudio(); if(vCurrentAudio){vCurrentAudio.pause();vCurrentAudio=null;} vStartRecording(); }
function voiceTapStop() { if(vIsRecording) vKillRecording(); }

function setVoiceState(s) {
  vState = s;
  const dots=document.getElementById('voiceDots'),label=document.getElementById('voiceLabel'),sub=document.getElementById('voiceSub');
  const transcript=document.getElementById('voiceTranscript'),response=document.getElementById('voiceResponse');
  const micBtn=document.getElementById('vMicBtn'),stopBtn=document.getElementById('vStopBtn');
  const playBtn=document.getElementById('vPlayBtn'),hint=document.getElementById('vAgainHint');
  if(!dots) return;
  dots.className = 'v-dots v-dots--'+s;
  const greet = userFaith ? (faithData[userFaith]?.greeting || 'Namaste') : 'Namaste';
  switch(s) {
    case 'idle':
      label.textContent = greet; sub.textContent='Tap the mic to start speaking'; sub.style.display='';
      transcript.style.display='none'; response.style.display='none';
      micBtn.style.display='flex'; micBtn.classList.remove('v-mic--pulse');
      stopBtn.style.display='none'; if(playBtn) playBtn.style.display='none'; hint.style.display='none'; break;
    case 'listening':
      label.textContent='Listening...'; sub.textContent='Tap the red button when done'; sub.style.display='';
      micBtn.style.display='none'; stopBtn.style.display='flex'; if(playBtn) playBtn.style.display='none'; hint.style.display='none'; break;
    case 'processing':
      label.textContent='Processing...'; sub.textContent='Converting speech to text'; sub.style.display='';
      micBtn.style.display='none'; stopBtn.style.display='none'; if(playBtn) playBtn.style.display='none'; hint.style.display='none'; break;
    case 'thinking':
      label.textContent='Thinking...'; sub.style.display='none';
      micBtn.style.display='none'; stopBtn.style.display='none'; if(playBtn) playBtn.style.display='none'; hint.style.display='none'; break;
    case 'speaking':
      label.textContent=''; sub.style.display='none';
      micBtn.style.display='flex'; micBtn.classList.add('v-mic--pulse');
      stopBtn.style.display='none'; if(playBtn) playBtn.style.display=vLastTtsBase64?'block':'none'; hint.style.display='block'; break;
  }
}

function vUnlockAudio() { if(vPlaybackCtx) return; try { vPlaybackCtx=new(window.AudioContext||window.webkitAudioContext)(); vPlaybackCtx.resume(); } catch(e){} }
function vBase64ToAB(b) { const bin=atob(b),bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }
function vPlayTts(b64) { if(!vPlaybackCtx||!b64) return; try { vPlaybackCtx.resume(); vPlaybackCtx.decodeAudioData(vBase64ToAB(b64)).then(buf=>{const src=vPlaybackCtx.createBufferSource();src.buffer=buf;src.connect(vPlaybackCtx.destination);src.onended=()=>{if(vState==='speaking')document.getElementById('voiceDots').className='v-dots v-dots--idle';};src.start(0)}).catch(()=>{}); } catch(e){} }
function voicePlayLastTts() { vUnlockAudio(); if(vLastTtsBase64) vPlayTts(vLastTtsBase64); }

async function vStartRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    vAudioChunks = []; vMediaRecorder = new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    vMediaRecorder.ondataavailable = e => { if(e.data.size>0) vAudioChunks.push(e.data); };
    vMediaRecorder.onstop = async () => { stream.getTracks().forEach(t=>t.stop()); if(!vAudioChunks.length){setVoiceState('idle');return;} await vProcessVoice(new Blob(vAudioChunks,{type:'audio/webm'})); };
    vMediaRecorder.start(); vIsRecording=true; setVoiceState('listening');
  } catch(err) {
    document.getElementById('voiceLabel').textContent='Mic access denied';
    document.getElementById('voiceSub').textContent='Please allow microphone and try again';
    document.getElementById('voiceSub').style.display='';
    document.getElementById('vMicBtn').style.display='flex';
  }
}
function vKillRecording() { if(vMediaRecorder&&vMediaRecorder.state==='recording') vMediaRecorder.stop(); vIsRecording=false; }

async function vProcessVoice(audioBlob) {
  setVoiceState('processing');
  try {
    const wavBlob = await vConvertToWav(audioBlob);
    const fd = new FormData(); fd.append('file',wavBlob,'audio.wav'); fd.append('model','saaras:v3'); fd.append('language_code','unknown'); fd.append('mode','transcribe');
    const sttResp = await fetch('https://api.sarvam.ai/speech-to-text',{method:'POST',headers:{'api-subscription-key':SARVAM_KEY},body:fd});
    if(!sttResp.ok) throw new Error('Speech recognition failed');
    const sttData = await sttResp.json();
    const transcript = (sttData.transcript||'').trim(), detectedLang = sttData.language_code||'en';
    if(!transcript) { document.getElementById('voiceLabel').textContent="Didn't catch that"; document.getElementById('voiceSub').textContent='Tap mic to try again'; document.getElementById('voiceSub').style.display=''; document.getElementById('vMicBtn').style.display='flex'; document.getElementById('vStopBtn').style.display='none'; return; }
    document.getElementById('voiceTranscript').textContent='"'+transcript+'"'; document.getElementById('voiceTranscript').style.display='block';
    setVoiceState('thinking');
    voiceChatHistory.push({role:'user',content:transcript});
    const resp = await fetch(VOICE_CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:voiceChatHistory})});
    const data = await resp.json().catch(()=>({}));
    if(!resp.ok) throw new Error(data.error?.message||'Chat error');
    const aiText = data.content?.[0]?.text||'';
    voiceChatHistory.push({role:'assistant',content:aiText});
    setVoiceState('speaking');
    const respEl = document.getElementById('voiceResponse'); respEl.style.display='block';
    respEl.innerHTML = '<div style="font-family:JioType,sans-serif;font-size:15px;color:#0c0d10;line-height:1.55">'+vFormatMd(aiText)+'</div>';
    vSpeakTTS(aiText, detectedLang);
    // Also add to chat
    setTimeout(() => { userMessage(transcript); const t=showThinking(); setTimeout(()=>{removeThinking();handleResponse(transcript.toLowerCase());},800); }, 300);
  } catch(err) {
    document.getElementById('voiceLabel').textContent='Something went wrong';
    document.getElementById('voiceSub').textContent=err.message||'Tap mic to try again';
    document.getElementById('voiceSub').style.display='';
    document.getElementById('vMicBtn').style.display='flex'; document.getElementById('vStopBtn').style.display='none';
    if(voiceChatHistory.length&&voiceChatHistory[voiceChatHistory.length-1].role==='user') voiceChatHistory.pop();
  }
}

function vFormatMd(t) {
  let h = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
  const lines=h.split('\n'); let r='',inL=false;
  for(const l of lines){const tr=l.trim();if(/^[-•*]\s/.test(tr)){if(!inL){r+='<ul>';inL=true;}r+='<li>'+tr.replace(/^[-•*]\s/,'')+'</li>';}else{if(inL){r+='</ul>';inL=false;}if(tr)r+='<p>'+tr+'</p>';}}
  if(inL)r+='</ul>'; return r||'<p>'+t+'</p>';
}

async function vSpeakTTS(text, lang) {
  const ttsLang = (lang&&lang.startsWith('hi'))?'hi-IN':'en-IN';
  const cleaned = text.replace(/[#*_`>\[\](){}|~]/g,'').replace(/\bhttps?:\/\/\S+/g,'').replace(/[^\w\s.,!?;:'"₹%\-\n\u0900-\u097F\u0A00-\u0A7F\u0A80-\u0AFF]/g,'').replace(/\n{2,}/g,'. ').replace(/\n/g,' ').trim().substring(0,500);
  if(!cleaned) return;
  try {
    const ttsResp = await fetch('https://api.sarvam.ai/text-to-speech',{method:'POST',headers:{'api-subscription-key':SARVAM_KEY,'Content-Type':'application/json'},body:JSON.stringify({inputs:[cleaned],target_language_code:ttsLang,speaker:'anushka',model:'bulbul:v2'})});
    const ttsData = await ttsResp.json(); if(!ttsResp.ok) return;
    if(ttsData.audios&&ttsData.audios[0]) {
      vLastTtsBase64=ttsData.audios[0];
      const vPlay=document.getElementById('vPlayBtn'); if(vPlay) vPlay.style.display='block';
      if(vPlaybackCtx) { vPlayTts(vLastTtsBase64); }
      else { const audio=new Audio('data:audio/wav;base64,'+vLastTtsBase64); vCurrentAudio=audio; audio.onended=()=>{if(vState==='speaking')document.getElementById('voiceDots').className='v-dots v-dots--idle';}; audio.play().catch(()=>{}); }
    }
  } catch(e) {}
}

async function vConvertToWav(webmBlob) {
  return new Promise(resolve => {
    const audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    const reader=new FileReader(); reader.onload=async function(){
      try { const ab=await audioCtx.decodeAudioData(reader.result); const offCtx=new OfflineAudioContext(1,ab.duration*16000,16000); const src=offCtx.createBufferSource(); src.buffer=ab; src.connect(offCtx.destination); src.start(); const rendered=await offCtx.startRendering(); resolve(new Blob([vEncodeWav(rendered.getChannelData(0),16000)],{type:'audio/wav'})); }
      catch(e) { resolve(webmBlob); }
    }; reader.readAsArrayBuffer(webmBlob);
  });
}
function vEncodeWav(samples,sr){const buf=new ArrayBuffer(44+samples.length*2),v=new DataView(buf);function ws(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}ws(0,'RIFF');v.setUint32(4,36+samples.length*2,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,samples.length*2,true);for(let i=0;i<samples.length;i++){const s=Math.max(-1,Math.min(1,samples[i]));v.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true);}return buf;}
