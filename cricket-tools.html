<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cricket — Jio AI</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

:root{
  --surface:#fff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;--surface-bold:#3900ad;
  --surface-subtle:#eeeeef;--surface-minimal:#f8f8f9;--surface-moderate:#e3e3e4;
  --text-high:#0c0d10;--text-medium:#191b1e;--text-low:rgba(25,27,30,.65);
  --icon-medium:#170054;--stroke-subtle:rgba(36,38,43,.12);
  --primary-50:#3535f3;--primary-20:#e8e8fc;--sparkle-50:#1eccb0;
  --grey-100:#141414;--grey-60:#b5b5b5;--grey-20:#f5f5f5;--error:#fa2f40;
  --shape-pill:999px;--shape-4xl:24px;--shape-l:16px;--shape-m:12px;--shape-s:8px;--shape-xs:4px;
  --font:'JioType',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--surface);color:var(--text-high);display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
a{text-decoration:none;color:inherit}

/* HERO BANNER */
.hero-banner{
  position:relative;width:100%;height:137px;overflow:hidden;flex-shrink:0;
}
.hero-banner-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:brightness(.85);
}
.hero-banner-gradient{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.45) 100%);
}
.back-btn{
  position:absolute;top:16px;left:12px;z-index:5;
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.back-btn:active{background:rgba(255,255,255,.3)}
.back-btn svg{width:20px;height:20px;color:#fff}

/* AVATAR */
.avatar-section{
  display:flex;flex-direction:column;align-items:center;
  margin-top:-56px;position:relative;z-index:3;
}
.avatar-ring{
  width:120px;height:120px;border-radius:50%;
  border:3px solid #f3e8ff;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-name{
  font-size:24px;font-weight:700;line-height:1.3;letter-spacing:-.72px;
  color:#000;text-align:center;margin-top:8px;
}

/* BODY */
.body-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:120px}

/* EXPLORE */
.section-block{padding:0 16px;margin-top:24px}
.section-title{font-size:16px;font-weight:700;line-height:1.1;color:var(--grey-100);margin-bottom:12px}
.chips-grid{display:flex;flex-direction:column;gap:10px}
.chips-row{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto}
.explore-chip{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:40px;
  background:#f1f1f1;cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.explore-chip:active{background:var(--primary-20)}
.explore-chip.disabled{opacity:.38;pointer-events:none;cursor:default}
.explore-chip .emoji{font-size:25px;line-height:1.3}
.explore-chip .label{font-size:15px;font-weight:500;color:#15253f;line-height:1}

/* LIVE & UPCOMING CARD */
.live-card{
  background:#faf8ff;border:1px solid #ebf1ff;
  border-radius:var(--shape-l);padding:16px;margin-top:12px;
}
.live-card-top{display:flex;align-items:center;justify-content:space-between;width:100%}
.live-team{display:flex;gap:7px;align-items:center;flex:1}
.live-team.right{flex-direction:row-reverse;text-align:right;justify-content:flex-start}
.live-team-flag{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--grey-20)}
.live-team-flag img{width:100%;height:100%;object-fit:contain}
.live-team-info{display:flex;flex-direction:column;gap:2px}
.live-team-name{font-size:16px;font-weight:500;line-height:1.1;color:var(--text-high)}
.live-team-score{font-size:16px;font-weight:700;line-height:1.1;color:var(--text-high)}
.live-team-overs{font-size:14px;font-weight:400;line-height:1.2;color:rgba(12,13,16,.46)}
.live-vs{width:30px;height:30px;border-radius:50%;background:var(--surface-minimal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-medium);flex-shrink:0}
.live-divider{width:100%;height:1px;background:#e0e1e2;margin:12px 0}
.live-bottom{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.live-badge{display:flex;align-items:center;gap:4px;background:var(--error);border-radius:2px;padding:0 7px}
.live-badge-dot{width:6px;height:6px;border-radius:50%;background:#fff}
.live-badge span{font-size:10px;font-weight:500;color:#fff;line-height:1.3}
.live-status{font-size:12px;font-weight:400;color:rgba(12,13,16,.66)}

/* FLOATING INPUT */
.input-widget{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:6px 12px 16px;
  background:linear-gradient(transparent,var(--surface) 30%);
}
.input-field{
  background:#eeeeef;border-radius:24px;
  padding:8px;display:flex;flex-direction:column;gap:8px;
}
.input-top{display:flex;align-items:center;gap:4px}
.input-text{
  flex:1;padding:4px 8px;font-family:var(--font);font-size:16px;font-weight:400;
  color:var(--text-low);opacity:.65;border:none;outline:none;background:none;
  line-height:1.3;
}
.input-actions{display:flex;justify-content:space-between;align-items:center}
.input-left{display:flex;gap:2px;align-items:center}
.input-icon-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.input-icon-btn svg{width:20px;height:20px;color:var(--text-low);opacity:.45}
.input-icon-btn:active{background:rgba(0,0,0,.05)}
.input-right{display:flex;gap:8px;align-items:center}
.input-mic-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.input-mic-btn svg{width:20px;height:20px;color:var(--text-low);opacity:.45}
.input-mic-btn:active{background:rgba(0,0,0,.05)}
.speak-btn{
  background:#6d17ce;border:none;border-radius:var(--shape-pill);
  padding:8px 16px;display:flex;align-items:center;gap:6px;cursor:pointer;
}
.speak-btn svg{width:14px;height:14px;color:#fff}
.speak-btn span{font-family:var(--font);font-weight:700;font-size:14px;color:#fff;line-height:1}
.speak-btn:active{opacity:.85;transform:scale(.97)}

/* ─── VOICE OVERLAY (BOTTOM-BAR-AND-VOICE-SPEC) ─── */
@keyframes dotBreath{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(.92);opacity:.4}}
@keyframes dotListen{0%,100%{transform:scale(1);opacity:1}25%{transform:scale(.7);opacity:.5}50%{transform:scale(1.08);opacity:1}75%{transform:scale(.8);opacity:.6}}
@keyframes dotProcess{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1);opacity:1}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(109,23,206,.4)}50%{box-shadow:0 0 0 16px rgba(109,23,206,0)}}
.v-dots{width:148px;height:148px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.v-dots div{border-radius:50%;background:#6d17ce;transition:background .3s}
.v-dots--idle div{animation:dotBreath 2.5s ease-in-out infinite;opacity:.5}
.v-dots--idle div:nth-child(2){animation-delay:.3s}.v-dots--idle div:nth-child(3){animation-delay:.6s}.v-dots--idle div:nth-child(4){animation-delay:.9s}
.v-dots--listening div{animation:dotListen 1s ease-in-out infinite;background:#6d17ce}
.v-dots--listening div:nth-child(2){animation-delay:.15s}.v-dots--listening div:nth-child(3){animation-delay:.3s}.v-dots--listening div:nth-child(4){animation-delay:.45s}
.v-dots--processing div,.v-dots--thinking div{animation:dotProcess 1.2s ease-in-out infinite;background:#9966dd}
.v-dots--processing div:nth-child(2),.v-dots--thinking div:nth-child(2){animation-delay:.2s}
.v-dots--processing div:nth-child(3),.v-dots--thinking div:nth-child(3){animation-delay:.4s}
.v-dots--processing div:nth-child(4),.v-dots--thinking div:nth-child(4){animation-delay:.6s}
.v-dots--speaking div{animation:dotBreath 2s ease-in-out infinite}
.v-mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:#6d17ce;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(109,23,206,.35)}
.v-mic-btn:active{transform:scale(.92)}.v-mic-btn.v-mic--pulse{animation:micPulse 1.5s ease-in-out infinite}
.v-stop-btn{width:64px;height:64px;border-radius:50%;border:none;background:#fa2f40;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(250,47,64,.3)}
.v-stop-btn:active{transform:scale(.92)}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:fadeDown .4s ease both;animation-delay:0s}
.anim-2{animation:fadeDown .4s ease both;animation-delay:.1s}
.anim-3{animation:fadeDown .4s ease both;animation-delay:.15s}
.anim-4{animation:fadeDown .4s ease both;animation-delay:.2s}
</style>
</head>
<body>

<!-- HERO BANNER -->
<div class="hero-banner anim-1">
  <img class="hero-banner-bg" src="https://sunit1986.github.io/design-prototypes/Assets/cricket/bg-cricket.png" alt="Cricket Banner" onerror="this.style.display='none';var d=document.getElementById('cricket-hero-fallback');if(d)d.style.display='block';">
  <div id="cricket-hero-fallback" class="hero-banner-bg" style="display:none;background:linear-gradient(135deg,#0c2461 0%,#1e3a5f 50%,#2d5a27 100%);position:absolute;inset:0"></div>
  <div class="hero-banner-gradient"></div>
  <a href="https://sunit1986.github.io/design-prototypes/jbiqhomepage.html" class="back-btn" aria-label="Back">
    <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>

<!-- AVATAR + NAME -->
<div class="avatar-section anim-1">
  <div class="avatar-ring">
    <img src="Assets/persona-cricket.png" alt="Cricket" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 120%22%3E%3Ccircle cx=%2260%22 cy=%2260%22 r=%2258%22 fill=%22%23e8e8fc%22/%3E%3Ctext x=%2260%22 y=%2272%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22%23170054%22%3E%F0%9F%8F%8F%3C/text%3E%3C/svg%3E'">
  </div>
  <div class="avatar-name">Cricket</div>
</div>

<!-- SCROLLABLE BODY -->
<div class="body-scroll">

  <!-- EXPLORE -->
  <div class="section-block anim-2">
    <div class="section-title">Explore</div>
    <div class="chips-grid">
      <div class="chips-row">
        <div class="explore-chip disabled">
          <span class="emoji">📊</span>
          <span class="label">Live Scores</span>
        </div>
        <a href="https://sunit1986.github.io/design-prototypes/cricket-flows/live-cricket-companion-chat.html" class="explore-chip">
          <span class="emoji">🧢</span>
          <span class="label">Live Cricket Companion</span>
        </a>
        <div class="explore-chip disabled">
          <span class="emoji">📅</span>
          <span class="label">Match Schedule</span>
        </div>
        <div class="explore-chip disabled">
          <span class="emoji">🏏</span>
          <span class="label">IPL 2026</span>
        </div>
      </div>
      <div class="chips-row">
        <div class="explore-chip disabled">
          <span class="emoji">🎯</span>
          <span class="label">Play Cricket</span>
        </div>
        <div class="explore-chip disabled">
          <span class="emoji">🎟</span>
          <span class="label">Match Tickets</span>
        </div>
        <div class="explore-chip disabled">
          <span class="emoji">🏏</span>
          <span class="label">Upcoming Matches</span>
        </div>
      </div>
    </div>
  </div>

  <!-- LIVE & UPCOMING -->
  <div class="section-block anim-3" style="margin-top:24px">
    <div class="section-title">Live & Upcoming</div>
    <div class="live-card anim-3">
      <div class="live-card-top">
        <div class="live-team">
          <div class="live-team-flag">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png" alt="IND">
          </div>

          <div class="live-team-info" style="align-items:flex-end">

  </div>

  <div style="height:32px"></div>
</div>

<!-- BOTTOM INPUT BAR (BOTTOM-BAR-AND-VOICE-SPEC) -->
<div class="input-widget" id="homeInput">
  <div class="input-field">
    <div class="input-top">
      <input class="input-text" type="text" placeholder="Hey Deepa, what's on your mind?" readonly id="homeInputText">
    </div>
    <div class="input-actions">
      <div class="input-left">
        <button class="input-icon-btn" aria-label="Add">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="input-right">
        <button class="input-mic-btn" aria-label="Mic">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z" fill="currentColor"/><path d="M19 10v2a7 7 0 01-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 19v3m-3 0h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="speak-btn" id="homeSpeakBtn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z" fill="currentColor"/></svg>
          <span>Speak</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- VOICE OVERLAY (BOTTOM-BAR-AND-VOICE-SPEC) -->
<div id="voiceOverlay" style="display:none;position:fixed;inset:0;z-index:100;background:#fff;flex-direction:column;font-family:var(--font)">
  <div style="display:flex;align-items:center;padding:10px 12px;height:56px;flex-shrink:0">
    <button onclick="closeVoice()" style="width:40px;height:40px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="#170054" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span style="font-size:16px;font-weight:500;color:var(--text-high);margin-left:4px">Voice</span>
    <span style="flex:1"></span>
  </div>
  <div id="voiceBody" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:0 24px">
    <div id="voiceDots" class="v-dots v-dots--idle"><div></div><div></div><div></div><div></div></div>
    <div id="voiceLabel" style="margin-top:28px;font-size:20px;font-weight:700;color:var(--text-high);text-align:center">Hey, Deepa</div>
    <div id="voiceSub" style="margin-top:8px;font-size:15px;font-weight:400;color:var(--text-low);text-align:center">Tap the mic to start speaking</div>
    <div id="voiceTranscript" style="display:none;margin-top:20px;font-size:15px;font-weight:500;color:var(--text-high);text-align:center;max-width:300px;line-height:1.5;background:#f5f5f5;padding:12px 16px;border-radius:16px"></div>
    <div id="voiceResponse" style="display:none;margin-top:16px;text-align:left;width:100%;max-width:330px;max-height:240px;overflow-y:auto"></div>
  </div>
  <div style="padding:12px 24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px">
    <button id="vMicBtn" onclick="voiceTapMic()" class="v-mic-btn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z" fill="#fff"/><path d="M19 10v2a7 7 0 01-14 0v-2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M12 19v3m-3 0h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button id="vStopBtn" onclick="voiceTapStop()" class="v-stop-btn" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="#fff"/></svg>
    </button>
    <div id="vAgainHint" style="display:none;font-size:13px;color:var(--text-low);text-align:center">Tap mic to speak again</div>
  </div>
</div>

<script>
// BOTTOM BAR & VOICE (BOTTOM-BAR-AND-VOICE-SPEC)
document.getElementById('homeInputText').addEventListener('click',function(){ openChat(); });
document.getElementById('homeInputText').removeAttribute('readonly');
document.getElementById('homeInputText').addEventListener('focus',function(e){ e.preventDefault(); this.blur(); openChat(); });
document.getElementById('homeSpeakBtn').addEventListener('click',function(){ openVoice(); });
var vState='closed',isRecording=false,mediaRecorder=null,audioChunks=[];
function openVoice(){ document.getElementById('voiceOverlay').style.display='flex'; setVoiceState('idle'); }
function closeVoice(){ if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop(); isRecording=false; document.getElementById('voiceOverlay').style.display='none'; vState='closed'; }
function setVoiceState(state){
  vState=state;
  var dots=document.getElementById('voiceDots'),label=document.getElementById('voiceLabel'),sub=document.getElementById('voiceSub');
  var transcript=document.getElementById('voiceTranscript'),response=document.getElementById('voiceResponse'),micBtn=document.getElementById('vMicBtn'),stopBtn=document.getElementById('vStopBtn'),hint=document.getElementById('vAgainHint');
  dots.className='v-dots v-dots--'+state;
  if(state==='idle'){ label.textContent='Hey, Deepa'; sub.textContent='Tap the mic to start speaking'; sub.style.display=''; transcript.style.display='none'; transcript.textContent=''; response.style.display='none'; response.innerHTML=''; micBtn.style.display='flex'; micBtn.classList.remove('v-mic--pulse'); stopBtn.style.display='none'; hint.style.display='none'; }
  else if(state==='listening'){ label.textContent='Listening...'; sub.textContent='Tap the red button when done'; sub.style.display=''; transcript.style.display='none'; response.style.display='none'; micBtn.style.display='none'; stopBtn.style.display='flex'; hint.style.display='none'; }
  else if(state==='speaking'){ label.textContent=''; sub.style.display='none'; micBtn.style.display='flex'; micBtn.classList.add('v-mic--pulse'); stopBtn.style.display='none'; hint.style.display='block'; }
}
async function voiceTapMic(){
  if(isRecording)return;
  try{ var stream=await navigator.mediaDevices.getUserMedia({audio:true}); audioChunks=[]; mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);}; mediaRecorder.onstop=function(){ stream.getTracks().forEach(function(t){t.stop();}); setVoiceState('idle'); }; mediaRecorder.start(); isRecording=true; setVoiceState('listening'); }
  catch(err){ console.error('Mic error:',err); document.getElementById('voiceLabel').textContent='Mic access denied'; document.getElementById('voiceSub').textContent='Please allow microphone and try again'; document.getElementById('voiceSub').style.display=''; document.getElementById('vMicBtn').style.display='flex'; }
}
function voiceTapStop(){ if(isRecording&&mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop(); isRecording=false; setVoiceState('idle'); }
function openChat(){ window.location.href='https://sunit1986.github.io/design-prototypes/jbiqhomepage.html'; }
</script>
