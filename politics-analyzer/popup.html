<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workplace Political Intelligence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(233,69,96,0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #e94560, #c23152);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .logo-sub {
      font-size: 10px;
      color: #8888aa;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #8888aa;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .icon-btn:hover { color: #e94560; }

    .body { padding: 14px 16px; }

    .input-section { margin-bottom: 12px; }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e8e8f0;
      font-family: inherit;
      font-size: 12px;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus { border-color: rgba(233,69,96,0.5); }
    textarea::placeholder { color: #555570; }

    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .mode-tab {
      flex: 1;
      padding: 6px 8px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #8888aa;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .mode-tab:hover { border-color: rgba(233,69,96,0.3); color: #e8e8f0; }
    .mode-tab.active {
      background: rgba(233,69,96,0.15);
      border-color: #e94560;
      color: #e94560;
    }

    .analyze-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #e94560, #c23152);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .analyze-btn:hover { opacity: 0.9; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Results */
    .results { margin-top: 14px; }

    .result-section {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .result-header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .result-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .result-body { padding: 0 12px 10px; }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .risk-low    { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .risk-medium { background: rgba(251,146,60,0.15); color: #fb923c; }
    .risk-high   { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .risk-critical { background: rgba(220,38,38,0.2); color: #dc2626; border: 1px solid #dc2626; }

    .risk-score-bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      margin: 8px 0;
      overflow: hidden;
    }
    .risk-score-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #22c55e, #fb923c, #ef4444);
      transition: width 0.6s ease;
    }

    .signal-item {
      margin: 8px 0;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border-left: 2px solid #e94560;
      border-radius: 0 6px 6px 0;
    }
    .signal-name {
      font-size: 11px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 3px;
    }
    .signal-quote {
      font-size: 11px;
      color: #aaaacc;
      font-style: italic;
      margin-bottom: 4px;
    }
    .signal-explanation { font-size: 12px; color: #c8c8e0; line-height: 1.4; }

    .severity-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .sev-low    { background: #22c55e; }
    .sev-medium { background: #fb923c; }
    .sev-high   { background: #ef4444; }

    .intent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .intent-box {
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    .intent-label {
      font-size: 10px;
      font-weight: 700;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .intent-text { font-size: 12px; color: #e8e8f0; line-height: 1.4; }

    .reply-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .reply-tab {
      flex: 1;
      padding: 5px;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      color: #8888aa;
      background: transparent;
      transition: all 0.2s;
    }
    .reply-tab.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }

    .reply-text {
      font-size: 12px;
      line-height: 1.5;
      color: #c8c8e0;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    .reply-rationale {
      font-size: 11px;
      color: #888890;
      margin-top: 6px;
      font-style: italic;
    }
    .copy-reply-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 6px;
      color: #e94560;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-reply-btn:hover { background: rgba(233,69,96,0.25); }

    .summary-text {
      font-size: 12px;
      color: #c8c8e0;
      line-height: 1.6;
    }

    .action-list { list-style: none; }
    .action-list li {
      font-size: 12px;
      color: #c8c8e0;
      padding: 4px 0;
      padding-left: 16px;
      position: relative;
      line-height: 1.4;
    }
    .action-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: #e94560;
      font-weight: 700;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 24px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(233,69,96,0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: #8888aa; }

    /* Error */
    .error-state {
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #ef4444;
      font-size: 12px;
      line-height: 1.5;
    }

    /* No API key warning */
    .setup-prompt {
      padding: 14px 16px;
      text-align: center;
    }
    .setup-prompt p { font-size: 12px; color: #8888aa; margin-bottom: 10px; line-height: 1.5; }
    .setup-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #e94560, #c23152);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-link {
      font-size: 10px;
      color: #555570;
      cursor: pointer;
      text-decoration: none;
    }
    .footer-link:hover { color: #e94560; }

    .hidden { display: none !important; }
    .chevron { transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">Political Intelligence</div>
        <div class="logo-sub">Workplace Power Decoder</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="historyBtn" title="Analysis history">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="body">

    <!-- Setup prompt (no API key) -->
    <div id="setupPrompt" class="setup-prompt hidden">
      <p>Add your API key to start analyzing workplace politics.</p>
      <button class="setup-btn" id="setupBtn">Configure API Key →</button>
    </div>

    <!-- Main input -->
    <div id="mainView">
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="message">Message</div>
        <div class="mode-tab" data-mode="thread">Thread</div>
        <div class="mode-tab" data-mode="quick">Quick Decode</div>
      </div>

      <div class="input-section">
        <div class="label">Paste text to analyze</div>
        <textarea id="inputText" placeholder="Paste a workplace message, email, or Slack thread…"></textarea>
      </div>

      <button class="analyze-btn" id="analyzeBtn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        Analyze Politics
      </button>

      <!-- Results area -->
      <div id="resultsArea" class="results hidden"></div>
    </div>

  </div>

  <div class="footer">
    <span class="footer-link" id="openSidebarLink">Open Full Panel</span>
    <span class="footer-link" id="footerSettings">Settings</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
