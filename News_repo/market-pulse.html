<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary-20: #e8e8fc;
  --primary-30: #9999ff;
  --primary-50: #3535f3;
  --primary-60: #000093;
  --primary-70: #00004c;
  --primary-80: #010029;
  --secondary-20: #fef7e9;
  --secondary-40: #ffd947;
  --secondary-50: #f7ab20;
  --secondary-60: #ac660c;
  --sparkle-20: #e8faf7;
  --sparkle-50: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: rgba(0,0,0,0.66);
  --grey-60: #b5b5b5;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-ghost-icon: #e7e9ff;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --stroke-subtle: rgba(36,38,43,0.12);
  --text-low: rgba(25,27,30,0.65);
  --text-disabled: rgba(25,27,30,0.38);
  --icon-medium: #170054;
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType', sans-serif; background: var(--white); display: flex; flex-direction: column; }

.phone-frame { width: 100%; height: 100%; background: var(--white); position: relative; overflow: hidden; }

/* Header */
.app-header {
  height: 56px; padding: 0 12px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--stroke-subtle); background: var(--white); position: relative; z-index: 80;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: 50%; text-decoration: none; }
.back-btn:active { background: var(--surface-ghost); }
.back-btn svg { width: 24px; height: 24px; fill: var(--grey-100); }
.header-title-block { display: flex; flex-direction: column; }
.header-title { font-size: 16px; font-weight: 500; color: var(--grey-100); line-height: 1.2; }
.header-domain { font-size: 12px; color: var(--grey-80); line-height: 1.3; }

/* Chat area */
.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }

.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-full { max-width: 100%; width: 100%; }

.bubble { padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100); word-wrap: break-word; }
.bubble-ai { background: var(--surface-ghost); border-radius: var(--radius-xs) var(--radius-lg) var(--radius-lg) var(--radius-lg); }
.bubble-user { background: var(--primary-50); color: var(--white); border-radius: var(--radius-lg) var(--radius-xs) var(--radius-lg) var(--radius-lg); }

/* Skeleton loading */
.skeleton { background: linear-gradient(90deg, var(--surface-ghost) 25%, var(--grey-40) 50%, var(--surface-ghost) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Market Summary */
.ms-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--stroke-subtle); overflow: hidden; }
.ms-mood { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.ms-mood-green { background: var(--sparkle-20); }
.ms-mood-yellow { background: var(--secondary-20); }
.ms-mood-red { background: rgba(250,47,64,0.08); }
.ms-mood-dot { width: 14px; height: 14px; border-radius: 50%; animation: msPulse 1.5s ease infinite; }
.ms-mood-dot-green { background: var(--success); box-shadow: 0 0 8px rgba(37,171,33,0.4); }
.ms-mood-dot-yellow { background: var(--warning); box-shadow: 0 0 8px rgba(240,109,15,0.4); }
.ms-mood-dot-red { background: var(--error); box-shadow: 0 0 8px rgba(250,47,64,0.4); }
@keyframes msPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.ms-mood-text { font-size: 14px; font-weight: 900; color: var(--grey-100); }
.ms-mood-detail { font-size: 11px; color: var(--text-low); font-weight: 400; }
.ms-indices { display: flex; gap: 0; padding: 0; border-bottom: 1px solid var(--stroke-subtle); }
.ms-index { flex: 1; padding: 12px 10px; text-align: center; border-right: 1px solid var(--stroke-subtle); }
.ms-index:last-child { border-right: none; }
.ms-index-name { font-size: 10px; font-weight: 700; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.5px; }
.ms-index-value { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-top: 2px; }
.ms-index-change { font-size: 11px; font-weight: 700; margin-top: 1px; }
.ms-section { padding: 14px 16px; }
.ms-section + .ms-section { border-top: 1px solid var(--stroke-subtle); }
.ms-section-title { font-size: 12px; font-weight: 900; color: var(--grey-100); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.ms-gl-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
.ms-gl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ms-gl-name { font-size: 13px; font-weight: 700; color: var(--grey-100); flex: 1; }
.ms-gl-pct { font-size: 13px; font-weight: 900; min-width: 48px; text-align: right; }
.ms-gl-reason { font-size: 10px; color: var(--text-low); margin-top: -2px; padding-left: 16px; }
.ms-sectors { display: flex; flex-wrap: wrap; gap: 6px; }
.ms-sector-tag { padding: 5px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
.ms-sector-up { background: rgba(37,171,33,0.08); color: var(--success); }
.ms-sector-down { background: rgba(250,47,64,0.08); color: var(--error); }
.ms-fii-row { display: flex; gap: 10px; }
.ms-fii-card { flex: 1; padding: 10px 12px; border-radius: var(--radius-sm); text-align: center; }
.ms-fii-buy { background: rgba(37,171,33,0.06); border: 1px solid rgba(37,171,33,0.15); }
.ms-fii-sell { background: rgba(250,47,64,0.06); border: 1px solid rgba(250,47,64,0.15); }
.ms-fii-label { font-size: 10px; font-weight: 700; color: var(--text-low); text-transform: uppercase; }
.ms-fii-who { font-size: 12px; font-weight: 900; color: var(--grey-100); margin-top: 2px; }
.ms-fii-amount { font-size: 14px; font-weight: 900; margin-top: 2px; }
.ms-gold-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--secondary-20); border-radius: var(--radius-sm); margin-top: 8px; }
.ms-gold-icon { font-size: 18px; }
.ms-gold-label { font-size: 12px; color: var(--grey-80); }
.ms-gold-price { font-size: 14px; font-weight: 900; color: var(--secondary-60); margin-left: auto; }
.ms-gold-change { font-size: 11px; font-weight: 700; color: var(--success); }
.ms-listen-btn { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 0 auto; padding: 10px 22px; border: none; border-radius: var(--radius-pill); background: var(--primary-50); color: var(--white); font-family: 'JioType', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.ms-listen-btn:active { transform: scale(0.96); }

/* Time Machine card */
.tm-carousel { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 4px 0; -webkit-overflow-scrolling: touch; }
.tm-carousel::-webkit-scrollbar { display: none; }
.tm-card {
  min-width: 280px; scroll-snap-align: start; border-radius: var(--radius-lg);
  padding: 20px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s;
}
.tm-card:active { transform: scale(0.97); }
.tm-card-green { background: linear-gradient(135deg, var(--sparkle-20) 0%, rgba(30,204,176,0.12) 100%); border: 1.5px solid rgba(30,204,176,0.2); }
.tm-card-red { background: rgba(250,47,64,0.06); border: 1.5px solid rgba(250,47,64,0.15); }
.tm-stock-name { font-size: 13px; font-weight: 700; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.5px; }
.tm-amount-row { display: flex; align-items: baseline; gap: 8px; margin-top: 8px; }
.tm-amount-start { font-size: 24px; font-weight: 900; color: var(--grey-100); }
.tm-arrow { font-size: 20px; font-weight: 700; }
.tm-arrow-green { color: var(--sparkle-50); }
.tm-arrow-red { color: var(--error); }
.tm-amount-end { font-size: 28px; font-weight: 900; }
.tm-amount-end-green { color: var(--sparkle-50); }
.tm-amount-end-red { color: var(--error); }
.tm-pct { font-size: 13px; font-weight: 700; margin-top: 4px; }
.tm-pct-green { color: var(--sparkle-50); }
.tm-pct-red { color: var(--error); }
.tm-period { font-size: 11px; color: var(--text-low); margin-top: 2px; }

/* Growth bar animation */
.tm-growth-bar { display: flex; align-items: flex-end; gap: 3px; height: 48px; margin-top: 12px; }
.tm-bar { width: 8px; border-radius: 4px 4px 0 0; animation: barGrow 0.8s ease-out forwards; transform-origin: bottom; }
.tm-bar-green { background: var(--sparkle-50); }
.tm-bar-red { background: var(--error); }
@keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }

.tm-hint { font-size: 12px; color: var(--text-low); text-align: center; margin-top: 8px; }
.tm-dots { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
.tm-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--grey-40); transition: all 0.3s; }
.tm-dot-active { background: var(--primary-50); width: 16px; border-radius: var(--radius-pill); }

/* Portfolio card */
.portfolio-card {
  background: linear-gradient(180deg, var(--primary-80) 0%, var(--primary-70) 50%, var(--primary-60) 100%);
  border-radius: var(--radius-lg); padding: 20px; color: var(--white);
}
.pf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.pf-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); }
.pf-listen-btn {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: var(--radius-pill); background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); cursor: pointer; transition: all 0.2s;
}
.pf-listen-btn:active { background: rgba(255,255,255,0.2); }
.pf-listen-btn span { font-size: 11px; font-weight: 700; color: var(--white); font-family: 'JioType', sans-serif; }
.pf-total-row { display: flex; align-items: baseline; gap: 12px; }
.pf-invested { font-size: 14px; color: rgba(255,255,255,0.6); }
.pf-current { font-size: 32px; font-weight: 900; color: var(--white); }
.pf-gain { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius-pill); background: rgba(30,204,176,0.15); font-size: 13px; font-weight: 700; color: var(--sparkle-50); margin-top: 8px; }

.pf-stocks { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.pf-stock-row {
  display: flex; align-items: center; padding: 12px; border-radius: var(--radius-md);
  background: rgba(255,255,255,0.06); cursor: pointer; transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.06);
}
.pf-stock-row:active { background: rgba(255,255,255,0.12); }
.pf-stock-indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
.pf-stock-indicator-up { background: var(--sparkle-50); box-shadow: 0 0 8px rgba(30,204,176,0.4); }
.pf-stock-indicator-down { background: var(--error); box-shadow: 0 0 8px rgba(250,47,64,0.4); }
.pf-stock-name { font-size: 14px; font-weight: 700; color: var(--white); }
.pf-stock-summary { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.pf-stock-value { margin-left: auto; text-align: right; }
.pf-stock-amount { font-size: 14px; font-weight: 700; color: var(--white); }
.pf-stock-change { font-size: 11px; font-weight: 700; }
.pf-stock-change-up { color: var(--sparkle-50); }
.pf-stock-change-down { color: var(--error); }

/* Stock detail bottom sheet */
.bottom-sheet-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
.bottom-sheet-overlay.active { opacity: 1; pointer-events: all; }
.bottom-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 201;
  background: var(--white); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 12px 16px 24px; transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); max-height: 80vh; overflow-y: auto;
}
.bottom-sheet.active { transform: translateY(0); }
.bs-handle { width: 40px; height: 4px; border-radius: var(--radius-pill); background: var(--grey-40); margin: 0 auto 16px; }
.bs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.bs-title { font-size: 18px; font-weight: 900; color: var(--grey-100); }
.bs-close {
  width: 32px; height: 32px; border-radius: 50%; background: var(--surface-ghost);
  display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
}
.bs-close:active { background: var(--grey-40); }
.bs-stock-meta { display: flex; flex-direction: column; gap: 12px; }
.bs-stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--stroke-subtle); }
.bs-stat-label { font-size: 13px; color: var(--text-low); font-weight: 500; }
.bs-stat-value { font-size: 14px; font-weight: 700; color: var(--grey-100); }
.bs-speak-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px; border-radius: var(--radius-lg);
  background: var(--surface-bold); border: none; cursor: pointer; margin-top: 16px;
}
.bs-speak-btn:active { opacity: 0.85; }
.bs-speak-btn span { font-size: 14px; font-weight: 700; color: var(--white); font-family: 'JioType', sans-serif; }

/* ₹100 Challenge */
.challenge-card {
  background: var(--secondary-20); border-radius: var(--radius-lg); padding: 20px;
  border: 1.5px solid rgba(247,171,32,0.2);
}
.challenge-title { font-size: 18px; font-weight: 900; color: var(--grey-100); }
.challenge-sub { font-size: 13px; color: var(--text-low); margin-top: 4px; }
.challenge-options { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.challenge-opt {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  border-radius: var(--radius-md); background: var(--white); cursor: pointer;
  border: 1.5px solid var(--stroke-subtle); transition: all 0.2s;
}
.challenge-opt:active { transform: scale(0.97); }
.challenge-opt:hover { border-color: var(--primary-50); }
.challenge-opt-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; font-weight: 900; color: var(--white);
}
.challenge-opt-safe { background: var(--sparkle-50); }
.challenge-opt-medium { background: var(--secondary-50); }
.challenge-opt-high { background: var(--primary-50); }
.challenge-opt-info h4 { font-size: 14px; font-weight: 700; color: var(--grey-100); }
.challenge-opt-info p { font-size: 12px; color: var(--text-low); margin-top: 2px; }
.challenge-risk-tag {
  margin-left: auto; font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: var(--radius-pill); text-transform: uppercase; letter-spacing: 0.5px;
}

/* Challenge result */
.challenge-result {
  border-radius: var(--radius-lg); padding: 20px; border: 1.5px solid var(--stroke-subtle);
  background: var(--white);
}
.cr-range-bar { height: 8px; border-radius: var(--radius-pill); background: var(--grey-20); margin: 16px 0 8px; position: relative; overflow: hidden; }
.cr-range-fill { height: 100%; border-radius: var(--radius-pill); animation: rangeFill 1s ease-out forwards; transform-origin: left; }
@keyframes rangeFill { from { width: 0; } }
.cr-range-labels { display: flex; justify-content: space-between; }
.cr-range-label { font-size: 12px; font-weight: 700; }
.cr-disclaimer { font-size: 11px; color: var(--text-low); margin-top: 12px; padding: 8px 12px; background: var(--grey-20); border-radius: var(--radius-sm); }
.cr-listen-btn, .sip-listen-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: var(--radius-pill); background: var(--primary-50); color: var(--white); font-family: 'JioType', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
.cr-listen-btn:active, .sip-listen-btn:active { transform: scale(0.96); }

/* Chai pe Charcha audio player */
.chai-card {
  background: linear-gradient(135deg, var(--secondary-20) 0%, var(--white) 100%);
  border-radius: var(--radius-lg); padding: 20px; border: 1.5px solid rgba(247,171,32,0.2);
}
.chai-header { display: flex; align-items: center; gap: 12px; }
.chai-icon {
  width: 48px; height: 48px; border-radius: var(--radius-md); background: var(--secondary-50);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chai-title { font-size: 16px; font-weight: 900; color: var(--grey-100); }
.chai-sub { font-size: 12px; color: var(--text-low); margin-top: 2px; }
.chai-waves { display: flex; gap: 3px; align-items: center; justify-content: center; height: 32px; margin: 16px 0; }
.chai-bar { width: 4px; border-radius: var(--radius-pill); background: var(--secondary-50); animation: chaiWave 1s ease-in-out infinite; }
.chai-waves-paused .chai-bar { animation: none; height: 4px; opacity: 0.38; }
@keyframes chaiWave { 0%, 100% { height: 6px; opacity: 0.38; } 50% { height: 28px; opacity: 1; } }
.chai-controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
.chai-play-btn {
  width: 48px; height: 48px; border-radius: 50%; background: var(--secondary-50);
  display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(247,171,32,0.3); transition: all 0.2s;
}
.chai-play-btn:active { transform: scale(0.9); }
.chai-time { font-size: 12px; font-weight: 500; color: var(--text-low); font-variant-numeric: tabular-nums; }

/* SIP Calculator */
.sip-card {
  background: var(--primary-20); border-radius: var(--radius-lg); padding: 20px;
  border: 1.5px solid rgba(53,53,243,0.15);
}
.sip-title { font-size: 16px; font-weight: 900; color: var(--grey-100); }
.sip-sub { font-size: 13px; color: var(--text-low); margin-top: 4px; }
.sip-input-row { display: flex; gap: 8px; margin-top: 16px; }
.sip-input-group { flex: 1; }
.sip-input-label { font-size: 11px; font-weight: 700; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.sip-input {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--grey-40);
  font-family: 'JioType', sans-serif; font-size: 16px; font-weight: 700; color: var(--grey-100);
  background: var(--white); outline: none; transition: border-color 0.2s;
}
.sip-input:focus { border-color: var(--primary-50); }
.sip-coins { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 80px; margin: 20px 0 12px; }
.sip-coin {
  width: 24px; border-radius: 4px 4px 0 0; background: var(--primary-50);
  animation: coinGrow 0.6s ease-out forwards; transform-origin: bottom;
}
@keyframes coinGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
.sip-result { text-align: center; }
.sip-result-label { font-size: 12px; color: var(--text-low); }
.sip-result-amount { font-size: 28px; font-weight: 900; color: var(--primary-50); margin-top: 4px; }
.sip-result-gain { font-size: 13px; font-weight: 700; color: var(--sparkle-50); margin-top: 4px; }
.sip-calc-btn {

// === ElevenLabs TTS ===
const ELEVENLABS_API_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const HINDI_VOICE_ID = 'zT03pEAEi0VHKciJODfn'; // Raju - relatable Hindi voice
const ttsCache = new Map();
let currentAudio = null;
let isSpeaking = false;

async function elevenLabsTTS(text, onended = null) {
  const cacheKey = text.substring(0, 100) + '|' + HINDI_VOICE_ID;
  if (ttsCache.has(cacheKey)) {
    playAudioFromUrl(ttsCache.get(cacheKey), onended);
    return;
  }
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${HINDI_VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.65, similarity_boost: 0.8, style: 0.2, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    ttsCache.set(cacheKey, url);
    playAudioFromUrl(url, onended);
  } catch (e) {
    console.warn('ElevenLabs TTS failed:', e);
    if (onended) setTimeout(onended, 1500);
  }
}

function playAudioFromUrl(url, onended) {
  // Preserve active group — stopCurrentAudio resets it but we're about to play new audio
  const savedGroup = _activeGroupId;
  stopCurrentAudio();
  _activeGroupId = savedGroup;
  currentAudio = new Audio(url);
  isSpeaking = true;
  currentAudio.onended = () => { isSpeaking = false; if (onended) onended(); };
  currentAudio.onerror = () => { isSpeaking = false; if (onended) onended(); };
  currentAudio.play().then(() => {
    // Audio started — enable the pause button for the active group
    if (_activeGroupId) {
      const pb = document.getElementById(_activeGroupId + '-pause');
      if (pb) { pb.disabled = false; pb.classList.remove('tts-paused'); }
    }
  }).catch(() => { isSpeaking = false; if (onended) setTimeout(onended, 300); });
}

function stopCurrentAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; isSpeaking = false; }
  resetTTSGroup();
}

// === TTS Play + Pause (two-button system) ===
const SPEAKER_ICON = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
const PAUSE_ICON = '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>';
const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
let _activeGroupId = null;

function playTTS(groupId, text) {
  const pauseBtn = document.getElementById(groupId + '-pause');

  // If this group was paused → resume
  if (_activeGroupId === groupId && currentAudio && currentAudio.paused && currentAudio.currentTime > 0) {
    currentAudio.play();
    if (pauseBtn) { pauseBtn.disabled = false; pauseBtn.classList.remove('tts-paused'); }
    showToast('Phir se sun rahe hain...');
    return;
  }

  // New playback — stop any previous audio first
  resetTTSGroup();
  _activeGroupId = groupId;
  // Pause button stays disabled until audio actually starts (enabled in playAudioFromUrl)
  showToast('Sun rahe hain...');

  elevenLabsTTS(text, () => {
    resetTTSGroup();
  });
}

function pauseTTS(groupId) {
  if (_activeGroupId !== groupId || !currentAudio) return;
  const pauseBtn = document.getElementById(groupId + '-pause');

  if (!currentAudio.paused) {
    currentAudio.pause();
    if (pauseBtn) pauseBtn.classList.add('tts-paused');
    showToast('Ruka diya');
  } else if (currentAudio.paused && currentAudio.currentTime > 0) {
    // Pressing pause again while paused → resume
    currentAudio.play();
    if (pauseBtn) pauseBtn.classList.remove('tts-paused');
    showToast('Phir se sun rahe hain...');
  }
}

function resetTTSGroup() {
  if (_activeGroupId) {
    const pauseBtn = document.getElementById(_activeGroupId + '-pause');
    if (pauseBtn) { pauseBtn.disabled = true; pauseBtn.classList.remove('tts-paused'); }
    _activeGroupId = null;
  }
}

function addMsg(type, html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-${type} fade-in`;
      div.innerHTML = `<div class="bubble bubble-${type}">${html}</div>`;
      chatArea.appendChild(div); scrollToBottom(); resolve();
    }, delay);
  });
}

function addRaw(html, delay = 0, fullWidth = false) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-ai fade-in${fullWidth ? ' msg-full' : ''}`;
      div.innerHTML = html;
      chatArea.appendChild(div); scrollToBottom(); resolve();
    }, delay);
  });
}

function showTyping() {

  chatArea.appendChild(div); scrollToBottom();
}
function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }
function scrollToBottom() { setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50); }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');

// === State Machine ===
let currentState = 'welcome';
let _lastNavAt = 0;
let chaiPlaying = false;

async function goToState(state) {
  const now = Date.now();
  if (now - _lastNavAt < 300) return;
  _lastNavAt = now;
  currentState = state;

  switch(state) {

    case 'welcome':
      await addMsg('ai', 'Namaskar Amit bhai! <strong>Market Pulse</strong> mein aapka swagat hai. Yahan stocks, portfolio aur market ki jaankari simple Hindi mein milegi — koi jargon nahi, koi chart nahi.');
      await wait(400);
      await addMsg('ai', 'Aaj aapke liye kya dekhein?');
      await addRaw(`
        <div class="chips">
          <div class="chip chip-rich" onclick="goToState('market_summary')">Aaj ka Bazaar<span class="chip-desc">Sensex, Nifty aur poora haal</span></div>
          <div class="chip chip-rich" onclick="goToState('portfolio')">Mera Portfolio<span class="chip-desc">Apne 4 stocks ka haal dekho</span></div>

          <div class="chip chip-rich" onclick="goToState('time_machine')">Time Machine<span class="chip-desc">Agar pehle invest kiya hota toh?</span></div>
          <div class="chip chip-rich" onclick="goToState('stock_dive')">Stock Deep Dive<span class="chip-desc">Kisi stock ya sector ko samjho</span></div>

    case 'market_summary':
      await addMsg('user', 'Aaj ka bazaar dikhao');
      showTyping(); await wait(800); hideTyping();

// === Build Time Machine Carousel ===
function buildTimeMachineCarousel() {
  const cards = STOCKS_DATA.timeMachine.map((s, i) => {
    const cls = s.positive ? 'green' : 'red';
    const arrow = s.positive ? '→' : '→';
    const bars = [];
    for (let j = 0; j < 12; j++) {
      const h = s.positive
        ? Math.floor(8 + (j / 11) * 38 + Math.random() * 6)
        : Math.floor(38 - (j / 11) * 28 + Math.random() * 6);
      bars.push(`<div class="tm-bar tm-bar-${cls}" style="height:${h}px;animation-delay:${j*0.06}s"></div>`);
    }
    return `<div class="tm-card tm-card-${cls}">
      <div class="tm-stock-name">${s.name}</div>
      <div class="tm-amount-row">
        <span class="tm-amount-start">₹${s.invested}</span>
        <span class="tm-arrow tm-arrow-${cls}">${arrow}</span>
        <span class="tm-amount-end tm-amount-end-${cls}">₹${s.current}</span>
      </div>
      <div class="tm-pct tm-pct-${cls}">${s.positive ? '+' : ''}${s.pct}%</div>
      <div class="tm-period">${s.period}</div>
      <div class="tm-growth-bar">${bars.join('')}</div>
    </div>`;
  }).join('');

  const dots = STOCKS_DATA.timeMachine.map((_, i) =>
    `<div class="tm-dot ${i === 0 ? 'tm-dot-active' : ''}" id="tmDot${i}"></div>`
  ).join('');

  return `<div class="tm-carousel" id="tmCarousel" onscroll="updateTMDots()">${cards}</div>
    <div class="tm-dots">${dots}</div>
    <div class="tm-hint">← Swipe karke aur stocks dekho →</div>`;
}

function updateTMDots() {
  const carousel = document.getElementById('tmCarousel');
  if (!carousel) return;
  const idx = Math.round(carousel.scrollLeft / 292);
  STOCKS_DATA.timeMachine.forEach((_, i) => {
    const dot = document.getElementById('tmDot' + i);
    if (dot) { dot.className = 'tm-dot' + (i === idx ? ' tm-dot-active' : ''); }
  });
}

let chaiTimerInterval = null;
let chaiSeconds = 0;
function toggleChai() {
  if (chaiPlaying) {
    stopCurrentAudio();
    chaiPlaying = false;
    document.getElementById('chaiWaves').classList.add('chai-waves-paused');
    document.getElementById('chaiPlayIcon').innerHTML = '<path d="M19.15 10.36l-10-7A2 2 0 008 3a1.88 1.88 0 00-.92.23A2 2 0 006 5v14a2 2 0 001.08 1.77c.282.154.599.233.92.23a2 2 0 001.15-.36l10-7a2 2 0 000-3.28z"/>';
    if (chaiTimerInterval) { clearInterval(chaiTimerInterval); chaiTimerInterval = null; }
  } else {
    chaiPlaying = true;
    chaiSeconds = 0;
    document.getElementById('chaiWaves').classList.remove('chai-waves-paused');
    document.getElementById('chaiPlayIcon').innerHTML = '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>';
    chaiTimerInterval = setInterval(() => {
      chaiSeconds++;
      const m = Math.floor(chaiSeconds / 60);
      const s = String(chaiSeconds % 60).padStart(2, '0');
      const el = document.getElementById('chaiTime');
      if (el) el.textContent = `${m}:${s} / 2:00`;
    }, 1000);
    elevenLabsTTS(STOCKS_DATA.chaiPeCharcha.speakText, () => {
      chaiPlaying = false;
      document.getElementById('chaiWaves')?.classList.add('chai-waves-paused');
      document.getElementById('chaiPlayIcon').innerHTML = '<path d="M19.15 10.36l-10-7A2 2 0 008 3a1.88 1.88 0 00-.92.23A2 2 0 006 5v14a2 2 0 001.08 1.77c.282.154.599.233.92.23a2 2 0 001.15-.36l10-7a2 2 0 000-3.28z"/>';
      if (chaiTimerInterval) { clearInterval(chaiTimerInterval); chaiTimerInterval = null; }
    });
  }
}

}

function showStockDiveResult(id) {

    showTyping(); await wait(800); hideTyping();

          </button>
        </div>
      </div>
    `, 200, true);

    await wait(600);
    // Suggest prompts — include gold/silver if they haven't picked it
    const goldChip = id !== 'gold_silver' ? '<div class="chip" onclick="showStockDiveResult(\'gold_silver\')">Sona-Chandi ka bhav</div>' : '';
    await addRaw(`
      <div class="chips">
        ${goldChip}
        <div class="chip" onclick="goToState('portfolio')">Mera Portfolio</div>
        <div class="chip" onclick="goToState('sip_calc')">SIP Calculator</div>

}

// === Build SIP Calculator Card ===
function buildSIPCard() {
  return `<div class="sip-card">
    <div class="sip-title">SIP Calculator</div>
    <div class="sip-sub">Chhoti rakam, bada sapna — dekhiye kaise badhta hai</div>
    <div class="sip-input-row">
      <div class="sip-input-group">
        <div class="sip-input-label">Har mahine (₹)</div>
        <input class="sip-input" type="number" id="sipAmount" value="500" min="100" step="100">
      </div>
      <div class="sip-input-group">
        <div class="sip-input-label">Kitne saal</div>
        <input class="sip-input" type="number" id="sipYears" value="3" min="1" max="30">
      </div>
      <div class="sip-input-group">
        <div class="sip-input-label">Return (%)</div>
        <input class="sip-input" type="number" id="sipReturn" value="12" min="1" max="30">
      </div>
    </div>
    <button class="sip-calc-btn" onclick="calculateSIP()"><span>Hisab lagao</span></button>
    <div id="sipResult"></div>
  </div>`;
}

function calculateSIP() {
  const monthly = parseInt(document.getElementById('sipAmount').value) || 500;
  const years = parseInt(document.getElementById('sipYears').value) || 3;
  const rate = parseInt(document.getElementById('sipReturn').value) || 12;

  const monthlyRate = rate / 12 / 100;
  const months = years * 12;
  const totalInvested = monthly * months;
  const futureValue = Math.round(monthly * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) * (1 + monthlyRate));
  const gain = futureValue - totalInvested;

  // Build coin visualization
  const coins = [];
  const numCoins = Math.min(years * 4, 20);
  for (let i = 0; i < numCoins; i++) {
    const h = Math.floor(10 + (i / (numCoins - 1)) * 65);
    coins.push(`<div class="sip-coin" style="height:${h}px;animation-delay:${i * 0.05}s"></div>`);
  }

  const resultEl = document.getElementById('sipResult');
  window._lastSIPSpeak = 'अमित भाई, अगर आप हर महीने ' + monthly + ' रुपये ' + years + ' साल तक लगाते हैं, तो कुल ' + totalInvested + ' रुपये लगेंगे। बारह प्रतिशत रिटर्न पर यह बढ़कर लगभग ' + futureValue + ' रुपये हो सकते हैं। यानी ' + gain + ' रुपये का फायदा।';

  resultEl.innerHTML = `
    <div class="sip-coins">${coins.join('')}</div>
    <div class="sip-result">
      <div class="sip-result-label">₹${monthly}/mahina × ${years} saal = </div>
      <div class="sip-result-amount">₹${futureValue.toLocaleString()}</div>
      <div class="sip-result-gain">Lagaya: ₹${totalInvested.toLocaleString()} | Profit: ₹${gain.toLocaleString()}</div>
    </div>
    <div class="tts-btn-group">
      <button class="sip-listen-btn" onclick="playTTS('tts-sip', window._lastSIPSpeak)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <span>Suniye</span>
      </button>
      <button class="tts-pause-btn" id="tts-sip-pause" disabled onclick="pauseTTS('tts-sip')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--grey-100)"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
      </button>
    </div>
  `;
  scrollToBottom();
}

// === Build Voice Query Card ===
function buildVoiceQueryCard() {
  return `<div class="voice-query-card">

    <div class="vq-sub">Hindi mein bolo — jawaab bhi Hindi mein milega</div>

async function simulateVoiceQuery() {

  await addMsg('user', 'Reliance ka kya scene hai?');

  const waveBars = [];
  for (let i = 0; i < 16; i++) {
    waveBars.push(`<div class="vr-bar" style="animation-delay:${i * 0.06}s"></div>`);
  }

  await addRaw(`
    <div class="voice-resp-card">
      <div class="vr-header">
        <div class="vr-avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
        </div>
        <span class="vr-name">Market Pulse AI</span>
      </div>
      <div class="vr-text">
        <strong>Reliance Industries</strong> aaj <strong>₹2,450</strong> par hai, <strong>1.2% upar</strong>. Jio ka subscriber count record level par hai. Retail segment ka margin thoda kam hua hai. Overall, <strong>12 analysts mein se 9 ka kehna hai 'Buy'</strong>. Lekin Amit bhai, yeh sirf jaankari hai — invest karne se pehle apna research zaroor karein.

    </div>
  `, 200, true);

  const relianceSpeakText = 'रिलायंस इंडस्ट्रीज़ आज चौबीस सौ पचास रुपये पर है, एक पॉइंट दो प्रतिशत ऊपर। जियो का सब्सक्राइबर काउंट रिकॉर्ड लेवल पर है। रिटेल सेगमेंट का मार्जिन थोड़ा कम हुआ है। ओवरऑल, बारह एनालिस्ट्स में से नौ का कहना है बाय। लेकिन अमित भाई, यह सिर्फ जानकारी है — इन्वेस्ट करने से पहले अपना रिसर्च ज़रूर करें।';
  elevenLabsTTS(relianceSpeakText, () => {
    const w = document.getElementById('vrWaves');
    if (w) w.classList.add('vr-waves-done');
  });

  await wait(800);
  await addRaw(`
    <div class="chips">
      <div class="chip" onclick="goToState('portfolio')">Mera Portfolio</div>
      <div class="chip" onclick="goToState('stock_dive')">Stock Deep Dive</div>
      <div class="chip" onclick="showStockDiveResult('gold_silver')">Sona-Chandi ka bhav</div>
    </div>
  `, 400);
}

// === Input Handlers ===
function handleTextInput() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const lowerText = text.toLowerCase();
  if (lowerText.includes('bazaar') || lowerText.includes('market') || lowerText.includes('sensex') || lowerText.includes('nifty') || lowerText.includes('aaj ka')) {
    goToState('market_summary');
  } else if (lowerText.includes('reliance') || lowerText.includes('scene') || lowerText.includes('kya')) {
    addMsg('user', text).then(() => simulateReliance());
  } else if (lowerText.includes('portfolio') || lowerText.includes('mera')) {
    goToState('portfolio');
  } else if (lowerText.includes('sip') || lowerText.includes('calculator')) {
    goToState('sip_calc');
  } else if (lowerText.includes('chai') || lowerText.includes('charcha')) {
    goToState('chai_pe_charcha');
  } else if (lowerText.includes('100') || lowerText.includes('challenge')) {
    goToState('challenge');
  } else if (lowerText.includes('gold') || lowerText.includes('sona') || lowerText.includes('chandi') || lowerText.includes('silver')) {
    addMsg('user', text).then(() => showStockDiveResult('gold_silver'));
  } else if (lowerText.includes('sector') || lowerText.includes('deep dive') || lowerText.includes('banking') || lowerText.includes('it sector')) {
    goToState('stock_dive');
  } else {
    addMsg('user', text).then(async () => {
      showTyping(); await wait(600); hideTyping();
      await addMsg('ai', 'Amit bhai, iske baare mein abhi jaankari nahi hai. Yeh try karo:');
      await addRaw(`
        <div class="chips">
          <div class="chip" onclick="goToState('stock_dive')">Stock Deep Dive</div>
          <div class="chip" onclick="goToState('portfolio')">Mera Portfolio</div>
          <div class="chip" onclick="goToState('chai_pe_charcha')">Chai pe Charcha</div>
        </div>
      `, 200);
    });
  }
}

async function simulateReliance() {
  showTyping(); await wait(1000); hideTyping();
  const waveBars = [];
  for (let i = 0; i < 16; i++) {
    waveBars.push(`<div class="vr-bar" style="animation-delay:${i * 0.06}s"></div>`);
  }
  await addRaw(`
    <div class="voice-resp-card">
      <div class="vr-header">
        <div class="vr-avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
        </div>
        <span class="vr-name">Market Pulse AI</span>
      </div>
      <div class="vr-text">
        <strong>Reliance Industries</strong> aaj <strong>₹2,450</strong> par hai, <strong>1.2% upar</strong>. Jio ka subscriber count record level par hai. Retail segment ka margin thoda kam hua hai. <strong>12 analysts mein se 9</strong> ka kehna hai 'Buy'.
      </div>
      <div class="vr-waves" id="vrWaves2">${waveBars.join('')}</div>
    </div>
  `, 200, true);

  const relianceSpeak = 'रिलायंस इंडस्ट्रीज़ आज चौबीस सौ पचास रुपये पर है, एक पॉइंट दो प्रतिशत ऊपर। जियो का सब्सक्राइबर काउंट रिकॉर्ड लेवल पर है। बारह एनालिस्ट्स में से नौ का कहना है बाय।';
  elevenLabsTTS(relianceSpeak, () => {
    const w = document.getElementById('vrWaves2');
    if (w) w.classList.add('vr-waves-done');
  });
}

function handleVoiceInput() {
  simulateVoiceQuery();
}

// === Start ===
goToState('welcome');
</script>
