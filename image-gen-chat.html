  --ease-decelerate: cubic-bezier(0.0, 0.0, 0.2, 1);
  --ease-accelerate: cubic-bezier(0.4, 0.0, 1, 1);

  --dur-mod: 250ms;

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overscroll-behavior: none; touch-action: manipulation; }
body {

/* ========================================
   JIO OMNI AI — CONFIGURABLE CHAT SHELL
   Scalable, modular, config-driven.
   Change CONFIG object → new experience.
   ======================================== */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'JioType', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

/* ── JDS DESIGN TOKENS ── */
:root {
  --surface: #ffffff;
  --surface-ghost: #eeeeef;
  --surface-ghost-icon: #e7e9ff;
  --surface-bold: #3900ad;
  --surface-minimal: #f5f5f6;
  --surface-moderate: #e3e3e4;
  --text-high: #0c0d10;
  --text-medium: #191b1e;
  --text-low: rgba(25,27,30,0.65);
  --text-on-bold: #ffffff;
  --icon-medium: #170054;
  --primary-20: #e8e8fc;
  --primary-30: #9999ff;
  --primary-50: #3535f3;
  --primary-60: #000093;
  --primary-70: #00004c;
  --secondary-20: #fef7e9;
  --secondary-30: #ffe3ae;
  --secondary-40: #ffd947;
  --secondary-50: #f7ab20;
  --sparkle-20: #e8faf7;
  --sparkle-30: #a7f6e9;
  --sparkle-50: #1eccb0;
  --sparkle-60: #1e7b74;
  --grey-20: #f5f5f5;
  --grey-40: #e0e0e0;
  --grey-60: #b5b5b5;
  --grey-80: rgba(0,0,0,0.65);
  --grey-100: #141414;
  --error: #fa2f40;
  --success: #25ab21;
  --shape-4xl: 23px;
  --shape-pill: 999px;
  --shape-large: 16px;
  --shape-medium: 12px;
  --shape-small: 8px;
  --shape-xsmall: 4px;
  --dur-quick: 200ms;
  --dur-medium: 350ms;
  --dur-slow: 500ms;
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-decelerate: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── PHONE FRAME (REUSABLE SHELL) ── */
.phone-frame {
  width: 360px; height: 800px; background: var(--surface);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  border-radius: 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.15);
}
@media (max-width: 400px) {

}

/* ── STATUS BAR ── */
.status-bar {
  height: 52px; padding: 14px 24px 0;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; background: var(--surface);
}
.status-bar .time { font-size: 15px; font-weight: 600; color: var(--text-high); }
.status-bar .icons { display: flex; gap: 6px; align-items: center; }
.status-bar .icons svg { width: 16px; height: 16px; fill: var(--text-high); }

/* ── HEADER NAV ── */
.header-nav {
  display: flex; align-items: center; padding: 8px 16px;
  flex-shrink: 0; border-bottom: 1px solid var(--surface-moderate); background: var(--surface);
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-back {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 50%;
}
.header-back svg { width: 20px; height: 20px; fill: var(--text-high); }
.header-title-area { flex: 1; }
.header-title { font-size: 16px; font-weight: 500; color: var(--text-high); line-height: 1; }
.header-domain { font-size: 12px; color: var(--text-low); line-height: 1.3; }
.header-right { display: flex; gap: 4px; }
.header-icon-btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 50%; border: none; background: transparent;
}
.header-icon-btn svg { width: 20px; height: 20px; fill: var(--text-high); }
.header-icon-btn:active { background: var(--surface-ghost); }

/* ── CHAT AREA (SCROLLABLE CONTENT) ── */
.chat-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 0; display: flex; flex-direction: column;
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.chat-area > * { max-width: 100%; min-width: 0; box-sizing: border-box; }
.chat-area::-webkit-scrollbar { width: 2px; }

/* ── LANDING SECTION (CONFIG-DRIVEN) ── */
.landing-section {

  animation: fadeInUp 500ms var(--ease-decelerate);
}
.landing-icon-wrap {

  animation: pulseGlow 3s infinite ease-in-out;

.landing-icon-wrap video { width: 100%; height: 100%; object-fit: cover; }
.landing-icon-wrap svg { width: 40px; height: 40px; }
.landing-title {

}

}

/* ── SUGGESTION CARDS (HORIZONTAL SCROLL) ── */
.suggestion-section { width: 100%; margin-bottom: 20px; }
.suggestion-section-title {
  font-size: 13px; font-weight: 600; color: var(--text-low);
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 0 20px; margin-bottom: 10px;
}
.suggestion-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding: 0 20px;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.suggestion-scroll::-webkit-scrollbar { display: none; }

.suggestion-card {
  min-width: 140px; max-width: 160px; flex-shrink: 0;
  border-radius: var(--shape-large); overflow: hidden;
  cursor: pointer; scroll-snap-align: start;

  transition: transform var(--dur-quick) var(--ease-standard), box-shadow var(--dur-quick) var(--ease-standard);
  animation: cardSlideIn 400ms var(--ease-decelerate) both;
}
.suggestion-card:nth-child(1) { animation-delay: 0ms; }
.suggestion-card:nth-child(2) { animation-delay: 60ms; }
.suggestion-card:nth-child(3) { animation-delay: 120ms; }
.suggestion-card:nth-child(4) { animation-delay: 180ms; }
.suggestion-card:nth-child(5) { animation-delay: 240ms; }
.suggestion-card:nth-child(6) { animation-delay: 300ms; }
.suggestion-card:active { transform: scale(0.97); }
.suggestion-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

.card-img {
  width: 100%; aspect-ratio: 4/3; object-fit: cover;
  background: var(--surface-ghost);
  transition: transform 300ms var(--ease-standard);
}
.suggestion-card:hover .card-img { transform: scale(1.03); }
.suggestion-card { overflow: hidden; }
.card-body { padding: 10px 12px; }
.card-label {
  font-size: 13px; font-weight: 600; color: var(--text-high);
  line-height: 1.3; margin-bottom: 2px;
}
.card-desc {
  font-size: 11px; color: var(--text-low); line-height: 1.3;

/* ── STYLE SELECTOR PILLS ── */
.style-section { width: 100%; padding: 0 20px; margin-bottom: 20px; }
.style-section-title {
  font-size: 13px; font-weight: 600; color: var(--text-low);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
}
.style-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.style-pill {

/* ── QUICK PROMPTS ── */
.quick-prompts { width: 100%; padding: 0 20px; margin-bottom: 16px; }
.quick-prompts-title {

/* ── MESSAGE BUBBLES ── */
.msg-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 16px; animation: msgIn 300ms var(--ease-decelerate) both; }
.msg-row.user { justify-content: flex-end; }
.msg-bubble { max-width: 270px; padding: 12px 16px; font-size: 15px; line-height: 1.45; color: var(--text-high); font-weight: 400; letter-spacing: -0.005em; }

}
.msg-row.ai .bot-icon video { width: 100%; height: 100%; object-fit: cover; }

.thinking-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; animation: msgIn 200ms var(--ease-decelerate); }

.thinking-dots { display: flex; gap: 4px; align-items: center; }
.thinking-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--primary-50);
  animation: dotBounce 1.4s infinite ease-in-out;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.16s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.32s; }
.thinking-label { font-size: 13px; color: var(--text-low); font-weight: 400; }

/* ── GENERATED IMAGE CARD ── */
.gen-image-wrap {
  padding: 6px 16px 6px 48px; animation: imageReveal 500ms var(--ease-decelerate) both;
}
.gen-image-card {
  border-radius: var(--shape-large); overflow: hidden;
  background: var(--surface-ghost); position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.gen-image-card img {
  width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
}
.gen-image-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px; display: flex; justify-content: flex-end; gap: 8px;
  background: rgba(0,0,0,0.35);
}
.gen-image-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.9); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(8px);
  transition: transform var(--dur-quick) var(--ease-standard);
}
.gen-image-btn:active { transform: scale(0.9); }
.gen-image-btn svg { width: 18px; height: 18px; fill: var(--grey-100); }

/* ── IMAGE LOADING SKELETON ── */
.gen-skeleton {
  width: 100%; aspect-ratio: 1; border-radius: var(--shape-large);
  background: linear-gradient(110deg, var(--surface-ghost) 8%, #f5f5f8 18%, var(--surface-ghost) 33%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite linear;
  position: relative; overflow: hidden;
}
.gen-skeleton-text {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px; display: flex; flex-direction: column; gap: 6px;
  align-items: center; justify-content: center;
  height: 100%;
}
.gen-skeleton-spinner {
  width: 40px; height: 40px; border: 3px solid var(--grey-40);

}
.gen-skeleton-label {
  font-size: 13px; color: var(--text-low); font-weight: 500;
  text-align: center;
}
.gen-skeleton-progress {
  width: 120px; height: 3px; background: var(--grey-40); border-radius: 2px;
  overflow: hidden; margin-top: 4px;
}
.gen-skeleton-progress-bar {
  height: 100%; background: var(--primary-50); border-radius: 2px;
  width: 0%; transition: width 300ms linear;
}

/* ── REFINEMENT PILLS (BELOW IMAGE) ── */
.refine-pills-wrap {
  padding: 4px 16px 4px 48px;

}
.refine-pills {

}
.refine-pill {

/* ── TOAST ── */
.toast-container {

}

/* ── VIEW TABS ── */
.view-tabs-wrap { padding: 6px 16px 6px 48px; }
.view-tabs {

/* ── HISTORY CARDS ── */
.history-section { padding: 20px; }
.history-title {
  font-size: 13px; font-weight: 600; color: var(--text-low);

}
.history-grid {

}
.history-card {

}
.history-card:nth-child(1) { animation-delay: 0ms; }
.history-card:nth-child(2) { animation-delay: 80ms; }
.history-card:nth-child(3) { animation-delay: 160ms; }
.history-card:nth-child(4) { animation-delay: 240ms; }
.history-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.history-card:active { transform: scale(0.97); }
.history-card-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 10px; font-size: 11px; font-weight: 600; color: #fff;

/* ── ANIMATIONS ── */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

function getIcon(name, color) {
  const svg = ICONS[name] || ICONS.sparkle;
  if (color) return svg.replace(/fill="currentColor"/g, `fill="${color}"`);
  return svg.replace(/fill="currentColor"/g, 'fill="#141414"');
}

function addMsg(type, html) {
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;
  if (type === 'ai') {
    row.innerHTML = `${botIconHTML()}<div class="msg-bubble">${html}</div>`;
  } else {
    row.innerHTML = `<div class="msg-bubble">${html}</div>`;
  }
  chat.appendChild(row);
  scrollBottom();
}

function addWidget(html) {
  const w = document.createElement('div');
  w.innerHTML = html;
  chat.appendChild(w.firstElementChild || w);
  scrollBottom();
}

function addThinking() {
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.id = 'thinkingRow';
  row.innerHTML = `<div class="thinking-icon"><video autoplay loop muted playsinline><source src="Assets/HelloJio_Listening_241.mp4" type="video/mp4"></video></div><div class="thinking-dots"><span></span><span></span><span></span></div><div class="thinking-label">Creating your image...</div>`;
  chat.appendChild(row);
  scrollBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingRow');
  if (el) el.remove();
}

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  toastContainer.innerHTML = '';
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* ================================================================
   RENDER LANDING PAGE (CONFIG-DRIVEN)
   ================================================================ */
function renderLanding() {
  chat.innerHTML = '';
  chatMode = false;

  // Landing hero
  let iconHTML = '';
  if (CONFIG.landing.icon === 'sparkle') {
    iconHTML = `<div class="landing-icon-wrap" style="background: linear-gradient(135deg, var(--primary-20), var(--surface-ghost-icon));">${getIcon('sparkle', 'var(--primary-50)')}</div>`;
  } else if (CONFIG.landing.icon.endsWith('.mp4')) {
    iconHTML = `<div class="landing-icon-wrap"><video autoplay loop muted playsinline><source src="${CONFIG.landing.icon}" type="video/mp4"></video></div>`;
  } else {
    iconHTML = `<div class="landing-icon-wrap" style="background: var(--surface-ghost);">${getIcon(CONFIG.landing.icon, 'var(--primary-50)')}</div>`;
  }

  const landingHTML = `
    <div class="landing-section">
      ${iconHTML}
      <div class="landing-title">${CONFIG.landing.title}</div>
      <div class="landing-subtitle">${CONFIG.landing.subtitle}</div>
    </div>
  `;
  addWidget(landingHTML);

  // Suggestion cards
  const cardsHTML = CONFIG.suggestions.map((s, i) => `
    <div class="suggestion-card" onclick="onCardClick('${s.id}')" style="animation-delay: ${i * 60}ms">
      <img class="card-img" src="${s.img}" alt="${s.label}" loading="lazy" onerror="this.style.background='var(--surface-ghost)'">
      <div class="card-body">
        <div class="card-label">${s.label}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
    </div>
  `).join('');

  addWidget(`
    <div class="suggestion-section">
      <div class="suggestion-section-title">What will you create?</div>
      <div class="suggestion-scroll">${cardsHTML}</div>
    </div>
  `);

  // Style pills
  const pillsHTML = CONFIG.styles.map(s => `
    <button class="style-pill ${s.id === currentStyle ? 'active' : ''}" onclick="selectStyle('${s.id}')">
      <span class="pill-dot" style="background: ${s.color};"></span>
      ${s.label}
    </button>
  `).join('');

  addWidget(`
    <div class="style-section">
      <div class="style-section-title">Choose a style</div>
      <div class="style-pills">${pillsHTML}</div>
    </div>
  `);

  // Quick prompts
  const promptsHTML = CONFIG.quickPrompts.map(p => `
    <button class="prompt-chip" onclick="onQuickPrompt('${p.label.replace(/'/g, "\\'")}')">
      ${getIcon(p.icon, 'var(--primary-50)')}
      ${p.label}
    </button>
  `).join('');

  addWidget(`
    <div class="quick-prompts">
      <div class="quick-prompts-title">Try these</div>
      <div>${promptsHTML}</div>
    </div>
  `);

  scrollBottom();
}

/* ================================================================
   STYLE SELECTION
   ================================================================ */
function selectStyle(id) {
  currentStyle = id;
  document.querySelectorAll('.style-pill').forEach(p => {
    p.classList.toggle('active', p.textContent.trim().toLowerCase().replace(/\s+/g, '') === id.replace(/\s+/g, '') || p.querySelector('.pill-dot')?.style.background === CONFIG.styles.find(s => s.id === id)?.color);
  });
  // Re-render style pills properly
  const container = document.querySelector('.style-pills');
  if (container) {
    container.innerHTML = CONFIG.styles.map(s => `
      <button class="style-pill ${s.id === currentStyle ? 'active' : ''}" onclick="selectStyle('${s.id}')">
        <span class="pill-dot" style="background: ${s.color};"></span>
        ${s.label}
      </button>
    `).join('');
  }
  showToast(`Style: ${CONFIG.styles.find(s => s.id === id)?.label || id}`);
}

/* ================================================================
   CARD CLICK → GENERATE IMAGE FLOW
   ================================================================ */
function onCardClick(cardId) {
  const card = CONFIG.suggestions.find(c => c.id === cardId);
  if (!card || isGenerating) return;
  const styl = CONFIG.styles.find(s => s.id === currentStyle);
  const fullPrompt = `${card.prompt} Style: ${styl?.label || 'Photorealistic'}.`;
  startGeneration(fullPrompt, cardId);
}

function onQuickPrompt(text) {
  if (isGenerating) return;
  startGeneration(text, 'default');
}

/* ================================================================
   IMAGE GENERATION FLOW
   ================================================================ */
function startGeneration(prompt, cardId) {
  isGenerating = true;
  chatMode = true;

  // Clear landing, show chat flow
  chat.innerHTML = '';

  // Show user message
  addMsg('user', prompt);

  // Show thinking
  setTimeout(() => {
    addThinking();

    // Show skeleton loading
    setTimeout(() => {
      removeThinking();
      showImageSkeleton();

      // Simulate generation progress
      let progress = 0;
      const bar = document.querySelector('.gen-skeleton-progress-bar');
      const label = document.querySelector('.gen-skeleton-label');
      const steps = ['Analyzing your prompt...', 'Composing elements...', 'Applying style...', 'Refining details...', 'Almost there...'];
      let stepIdx = 0;

      const progressInterval = setInterval(() => {
        progress += Math.random() * 15 + 5;
        if (progress > 95) progress = 95;
        if (bar) bar.style.width = progress + '%';
        if (stepIdx < steps.length && progress > (stepIdx + 1) * 18) {
          if (label) label.textContent = steps[stepIdx];
          stepIdx++;
        }
      }, 400);

      // Reveal image after ~3s
      setTimeout(() => {
        clearInterval(progressInterval);
        if (bar) bar.style.width = '100%';
        if (label) label.textContent = 'Done!';

        setTimeout(() => {
          revealGeneratedImage(cardId, prompt);
          isGenerating = false;
        }, 400);
      }, 3000);

    }, 800);
  }, 500);
}

function showImageSkeleton() {
  addWidget(`
    <div class="gen-image-wrap">
      <div class="gen-image-card" id="genImageCard">
        <div class="gen-skeleton" id="genSkeleton">
          <div class="gen-skeleton-text">
            <div class="gen-skeleton-spinner"></div>
            <div class="gen-skeleton-label">Analyzing your prompt...</div>
            <div class="gen-skeleton-progress"><div class="gen-skeleton-progress-bar"></div></div>
          </div>
        </div>
      </div>
    </div>
  `);
  scrollBottom();
}

function revealGeneratedImage(cardId, prompt) {
  const card = document.getElementById('genImageCard');
  if (!card) return;

  const imgUrl = CONFIG.generatedImages[cardId] || CONFIG.generatedImages.default;

  card.innerHTML = `
    <img src="${imgUrl}" alt="Generated image" style="animation: imageReveal 500ms var(--ease-decelerate);">
    <div class="gen-image-overlay">
      <button class="gen-image-btn" onclick="showToast('Copied to clipboard')" title="Copy">
        ${getIcon('copy', '#141414')}
      </button>
      <button class="gen-image-btn" onclick="showToast('Downloading...')" title="Download">
        ${getIcon('download', '#141414')}
      </button>
      <button class="gen-image-btn" onclick="showToast('Share sheet opened')" title="Share">
        ${getIcon('share', '#141414')}
      </button>
    </div>
  `;

  // Add AI response
  setTimeout(() => {
    addMsg('ai', CONFIG.botGreeting);

    // Add like/dislike row
    setTimeout(() => {
      addWidget(`
        <div style="display:flex;gap:4px;padding:0 16px 4px 48px;">
          <button style="width:28px;height:28px;border-radius:50%;border:1px solid var(--grey-40);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="this.style.background='var(--primary-20)';this.style.borderColor='var(--primary-50)';showToast('Thanks for the feedback!')">
            ${getIcon('like', 'var(--grey-60)')}
          </button>
          <button style="width:28px;height:28px;border-radius:50%;border:1px solid var(--grey-40);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="this.style.background='var(--primary-20)';this.style.borderColor='var(--primary-50)';showToast('I\'ll do better next time!')">
            ${getIcon('dislike', 'var(--grey-60)')}
          </button>
        </div>
      `);
    }, 200);

    // Add refinement pills
    setTimeout(() => {
      renderRefinePills(cardId);
    }, 400);
  }, 300);

  scrollBottom();
}

/* ================================================================
   REFINEMENT PILLS
   ================================================================ */
function renderRefinePills(cardId) {
  const pillsHTML = CONFIG.refinePills.map(p => `
    <button class="refine-pill" onclick="onRefinePill('${p.label.replace(/'/g, "\\'")}', '${cardId}')">
      ${getIcon(p.icon, 'var(--primary-50)')}
      ${p.label}
    </button>
  `).join('');

  addWidget(`
    <div class="refine-pills-wrap">
      <div class="refine-pills">${pillsHTML}</div>
    </div>
  `);
  scrollBottom();
}

function onRefinePill(label, cardId) {
  if (isGenerating) return;

  if (label === '4 variations') {
    generateVariations(cardId);
  } else if (label === 'Change style') {
    showStyleChanger(cardId);
  } else {
    // Generic refinement
    addMsg('user', label);
    isGenerating = true;
    setTimeout(() => {
      addThinking();
      setTimeout(() => {
        removeThinking();
        // Show a slightly different image
        const rndSeed = 'refined' + Date.now();
        addWidget(`
          <div class="gen-image-wrap">
            <div class="gen-image-card">
              <img src="https://picsum.photos/seed/${rndSeed}/600/600" alt="Refined image" style="animation: imageReveal 500ms var(--ease-decelerate);">
              <div class="gen-image-overlay">
                <button class="gen-image-btn" onclick="showToast('Copied to clipboard')">
                  ${getIcon('copy', '#141414')}
                </button>
                <button class="gen-image-btn" onclick="showToast('Downloading...')">
                  ${getIcon('download', '#141414')}
                </button>
                <button class="gen-image-btn" onclick="showToast('Share sheet opened')">
                  ${getIcon('share', '#141414')}
                </button>
              </div>
            </div>
          </div>
        `);
        setTimeout(() => {
          addMsg('ai', CONFIG.botFollowUp);
          renderRefinePills(cardId);
          isGenerating = false;
        }, 300);
      }, 2000);
    }, 500);
  }
}

/* ================================================================
   VARIATIONS FLOW
   ================================================================ */
function generateVariations(cardId) {
  isGenerating = true;
  addMsg('user', 'Show me 4 variations');
  setTimeout(() => {
    addThinking();
    setTimeout(() => {
      removeThinking();
      const baseUrl = CONFIG.generatedImages[cardId] || CONFIG.generatedImages.default;
      // Use different crop parameters to simulate variations
      const variations = [
        'https://picsum.photos/seed/var1' + cardId + '/300/300',
        'https://picsum.photos/seed/var2' + cardId + '/300/300',
        'https://picsum.photos/seed/var3' + cardId + '/300/300',
        'https://picsum.photos/seed/var4' + cardId + '/300/300',
      ];

      addWidget(`
        <div style="padding:6px 16px 6px 48px; animation: fadeInUp 400ms var(--ease-decelerate);">
          <div class="history-grid">
            ${variations.map((url, i) => `
              <div class="history-card" onclick="selectVariation(${i}, '${cardId}')" style="animation-delay:${i * 80}ms">
                <img src="${url}" alt="Variation ${i+1}">
                <div class="history-card-label">Variation ${i+1}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `);

      setTimeout(() => {
        addMsg('ai', CONFIG.botVariations);
        renderRefinePills(cardId);
        isGenerating = false;
      }, 400);
    }, 2500);
  }, 500);
}

function selectVariation(idx, cardId) {
  showToast(`Variation ${idx + 1} selected`);
}

/* ================================================================
   STYLE CHANGER
   ================================================================ */
function showStyleChanger(cardId) {
  const pillsHTML = CONFIG.styles.map(s => `
    <button class="style-pill ${s.id === currentStyle ? 'active' : ''}" onclick="changeStyleAndRegenerate('${s.id}', '${cardId}')">
      <span class="pill-dot" style="background: ${s.color};"></span>
      ${s.label}
    </button>
  `).join('');

  addWidget(`
    <div style="padding:6px 16px 6px 48px; animation: fadeInUp 300ms var(--ease-decelerate);">
      <div style="font-size:13px;font-weight:600;color:var(--text-low);margin-bottom:8px;">Pick a new style</div>
      <div class="style-pills">${pillsHTML}</div>
    </div>
  `);
  scrollBottom();
}

function changeStyleAndRegenerate(styleId, cardId) {
  currentStyle = styleId;
  const styleName = CONFIG.styles.find(s => s.id === styleId)?.label || styleId;
  addMsg('user', `Change to ${styleName} style`);
  isGenerating = true;
  setTimeout(() => {
    addThinking();
    setTimeout(() => {
      removeThinking();
      const stySeed = 'style' + styleId + Date.now();
      addWidget(`
        <div class="gen-image-wrap">
          <div class="gen-image-card">
            <img src="https://picsum.photos/seed/${stySeed}/600/600" alt="Restyled image" style="animation: imageReveal 500ms var(--ease-decelerate);">
            <div class="gen-image-overlay">
              <button class="gen-image-btn" onclick="showToast('Copied to clipboard')">
                ${getIcon('copy', '#141414')}
              </button>
              <button class="gen-image-btn" onclick="showToast('Downloading...')">
                ${getIcon('download', '#141414')}
              </button>
              <button class="gen-image-btn" onclick="showToast('Share sheet opened')">
                ${getIcon('share', '#141414')}
              </button>
            </div>
          </div>
        </div>
      `);
      setTimeout(() => {
        addMsg('ai', `Here it is in ${styleName} style! Like this better?`);
        renderRefinePills(cardId);
        isGenerating = false;
      }, 300);
    }, 2500);
  }, 500);
}

/* ================================================================
   FREE TEXT INPUT HANDLING
   ================================================================ */
function handleInput() {
  const hasText = inputField.value.trim().length > 0;
  sendBtn.classList.toggle('visible', hasText);
  speakBtn.style.display = hasText ? 'none' : 'flex';
}

function sendUserMsg() {
  const text = inputField.value.trim();
  if (!text || isGenerating) return;
  inputField.value = '';
  handleInput();
  startGeneration(text, 'default');
}

inputField.addEventListener('input', handleInput);
inputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendUserMsg(); });
sendBtn.addEventListener('click', sendUserMsg);

/* ================================================================
   HEADER BACK — RESET TO LANDING
   ================================================================ */
document.getElementById('headerBack').addEventListener('click', () => {
  if (chatMode) {
    renderLanding();
  }
});

/* ================================================================
   HISTORY BUTTON — SHOW PAST CREATIONS
   ================================================================ */
document.getElementById('historyBtn').addEventListener('click', () => {
  if (chatMode) {
    showToast('No history yet — create your first image!');
    return;
  }
  showToast('Your creation history will appear here');
});

/* ================================================================
   INITIALIZE — START WITH LANDING
   ================================================================ */
renderLanding();
</script>
</body>
</html>
